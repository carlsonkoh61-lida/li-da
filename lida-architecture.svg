<text class="ts" x="223" y="214" text-anchor="middle" dominant-baseline="central" fill="#534AB7">the AI read</text>
<rect x="287" y="182" width="106" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="t" x="340" y="198" text-anchor="middle" dominant-baseline="central" fill="#26215C">chart</text>
<text class="ts" x="340" y="214" text-anchor="middle" dominant-baseline="central" fill="#534AB7">price history</text>
<rect x="404" y="182" width="106" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
