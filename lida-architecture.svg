<text class="ts" x="223" y="356" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">charts</text>
<rect x="287" y="324" width="106" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="t" x="340" y="340" text-anchor="middle" dominant-baseline="central" fill="#04342C">Anthropic</text>
<text class="ts" x="340" y="356" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">the read</text>
<rect x="404" y="324" width="106" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="t" x="457" y="340" text-anchor="middle" dominant-baseline="central" fill="#04342C">Supabase</text>
<text class="ts" x="457" y="356" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">database · auth</text>
<rect x="521" y="324" width="106" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="t" x="574" y="340" text-anchor="middle" dominant-baseline="central" fill="#04342C">Resend</text>
<text class="ts" x="574" y="356" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">email</text>

<path d="M240 114 L223 180" fill="none" stroke="#BA7517" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M223 226 L120 322" fill="none" stroke="#BA7517" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M223 226 L335 322" fill="none" stroke="#BA7517" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M223 226 L450 322" fill="none" stroke="#BA7517" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M574 226 L574 322" fill="none" stroke="#888780" stroke-width="1.1" marker-end="url(#arrow)"/>

<text class="ts" x="40" y="408" fill="#5F5E5A">Amber = pulling a read (Desk to analyze to data, AI, storage).   Grey = the scheduled alerts job.</text>
</svg>
