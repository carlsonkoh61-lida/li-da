<text class="t" x="106" y="340" text-anchor="middle" dominant-baseline="central" fill="#04342C">Finnhub</text>
<text class="ts" x="106" y="356" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">quotes · data</text>
