<text class="ts" x="574" y="214" text-anchor="middle" dominant-baseline="central" fill="#534AB7">cron · email</text>

<rect x="40" y="300" width="600" height="76" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 4"/>
<text class="band" x="54" y="318" fill="#5F5E5A">External services &amp; storage  (rented / outside)</text>
