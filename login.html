<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Li-Da · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/lida.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    position: relative; overflow: hidden;
  }
  /* terminal ambience: faint teal wash + fine engineering grid */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(72% 60% at 50% -5%, rgba(143,176,214,0.07), transparent 70%),
      linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px) 0 0 / 100% 34px,
      linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px) 0 0 / 34px 100%;
  }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 392px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 28px 30px 26px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
  }

  /* terminal header line */
  .brand {
    font-family: var(--font-mono); font-weight: 500;
    letter-spacing: 0.16em; font-size: 12px; color: var(--accent);
    text-align: left; margin: 0 0 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .brand::after { content: "  //  research terminal"; color: var(--muted); letter-spacing: 0.12em; }

  h1 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 23px; margin: 0 0 6px; text-align: left; letter-spacing: -0.01em;
  }
  .sub { color: var(--muted); font-size: 13px; text-align: left; margin: 0 0 24px; line-height: 1.5; }

  label {
    display: block; font-family: var(--font-mono); font-size: 10.5px;
    color: var(--muted); margin: 0 0 7px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  input {
    width: 100%; background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 12px 13px; font-size: 14px; font-family: var(--font-mono);
    margin-bottom: 16px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input::placeholder { color: #495063; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(143,176,214,0.14); }

  button.primary {
    width: 100%; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--r-sm); padding: 13px;
    font-size: 14.5px; font-weight: 600; font-family: var(--font-display);
    letter-spacing: 0.01em; cursor: pointer; transition: filter 0.15s; margin-top: 4px;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled { opacity: 0.5; cursor: default; }

  /* Continue with Google — calm, on-brand (the only non-token colors are inside
     Google's own "G" logo, which can't be recolored). */
  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--line-strong); border-radius: var(--r-sm);
    padding: 12px; font-size: 14px; font-weight: 600; font-family: var(--font-display);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .google-btn:hover { border-color: var(--accent); background: var(--surface); }
  .google-btn:disabled { opacity: 0.5; cursor: default; }
  .google-btn svg { width: 17px; height: 17px; flex: none; }
  .or-div { display: flex; align-items: center; gap: 12px; margin: 16px 0;
    color: var(--muted); font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; }
  .or-div::before, .or-div::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .toggle { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
  .toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .toggle a:hover { text-decoration: underline; }

  .msg { font-size: 12.5px; line-height: 1.5; margin: 4px 0 14px; padding: 10px 12px; border-radius: var(--r-sm); display: none; font-family: var(--font-mono); }
  .msg.err { display: block; color: var(--down); border: 1px solid rgba(224,101,95,0.3); background: rgba(224,101,95,0.06); }
  .msg.ok { display: block; color: var(--up); border: 1px solid rgba(70,184,131,0.3); background: rgba(70,184,131,0.06); }

  .signed { display: none; text-align: left; }
  .signed.show { display: block; }
  .signed .who { font-family: var(--font-mono); font-size: 14px; color: var(--accent); margin: 6px 0 4px; word-break: break-all; }
  .signed .tick { color: var(--up); font-size: 12px; font-family: var(--font-mono); margin-bottom: 22px; }
  .signed .row { display: flex; gap: 10px; }
  .signed a.btn, .signed button.btn {
    flex: 1; display: block; text-align: center; text-decoration: none;
    border-radius: var(--r-sm); padding: 12px; font-size: 13.5px; font-weight: 600;
    font-family: var(--font-display); cursor: pointer;
  }
  .signed a.btn { background: var(--accent); color: var(--bg); }
  .signed button.btn { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .signed button.btn:hover { color: var(--ink); border-color: var(--line-strong); }

  .note { color: var(--muted); font-family: var(--font-mono); font-size: 11px; text-align: left; margin-top: 22px; line-height: 1.6; letter-spacing: 0.02em; padding-top: 16px; border-top: 1px solid var(--line); }
  .note::before { content: "\25CF  "; color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">LI<span class="lida-dot"><span class="d-r"></span><span class="d-l"></span></span>DA</div>

    <!-- AUTH FORM -->
    <div id="formWrap">
      <h1 id="title">Welcome back</h1>
      <p class="sub" id="subtitle">Sign in to your research desk.</p>

      <div class="msg" id="msg"></div>

      <button class="google-btn" id="googleBtn" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continue with Google
      </button>

      <div class="or-div">or</div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@email.com" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

      <button class="primary" id="submitBtn">Sign in</button>

      <div class="toggle" id="toggle">
        New here? <a id="toggleLink">Create an account</a>
      </div>
    </div>

    <!-- SIGNED-IN STATE -->
    <div class="signed" id="signed">
      <h1>You're in.</h1>
      <div class="who" id="whoEmail"></div>
      <div class="tick">✓ signed in &amp; secured</div>
      <div class="row">
        <a class="btn" href="/research.html">Go to Desk</a>
        <button class="btn" id="signOutBtn">Sign out</button>
      </div>
    </div>

    <p class="note">Your journal is private to your account — secured at the database level.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script>
    var mode = "signin"; // or "signup"
    var $ = function (id) { return document.getElementById(id); };

    function showMsg(text, kind) {
      var m = $("msg");
      m.textContent = text;
      m.className = "msg " + kind;
    }
    function clearMsg() { $("msg").className = "msg"; }

    function showSignedIn(email) {
      $("formWrap").style.display = "none";
      $("whoEmail").textContent = email;
      $("signed").classList.add("show");
    }

    function nextDest() {
      var p = new URLSearchParams(window.location.search).get("next");
      return p || null;
    }

    function setMode(m) {
      mode = m;
      if (m === "signup") {
        $("title").textContent = "Create your account";
        $("subtitle").textContent = "Start your private research journal.";
        $("submitBtn").textContent = "Create account";
        $("password").setAttribute("autocomplete", "new-password");
        $("toggle").innerHTML = 'Already have an account? <a id="toggleLink">Sign in</a>';
      } else {
        $("title").textContent = "Welcome back";
        $("subtitle").textContent = "Sign in to your research desk.";
        $("submitBtn").textContent = "Sign in";
        $("password").setAttribute("autocomplete", "current-password");
        $("toggle").innerHTML = 'New here? <a id="toggleLink">Create an account</a>';
      }
      bindToggle();
      clearMsg();
    }

    function bindToggle() {
      $("toggleLink").onclick = function () {
        setMode(mode === "signin" ? "signup" : "signin");
      };
    }

    async function handleSubmit() {
      clearMsg();
      var email = $("email").value.trim();
      var password = $("password").value;
      if (!email || !password) { showMsg("Enter your email and password.", "err"); return; }
      if (mode === "signup" && password.length < 6) { showMsg("Password must be at least 6 characters.", "err"); return; }

      $("submitBtn").disabled = true;
      $("submitBtn").textContent = mode === "signup" ? "Creating…" : "Signing in…";

      try {
        var res = mode === "signup"
          ? await window.lidaAuth.signUp(email, password)
          : await window.lidaAuth.signIn(email, password);

        if (res.error) {
          showMsg(res.error.message, "err");
          $("submitBtn").disabled = false;
          $("submitBtn").textContent = mode === "signup" ? "Create account" : "Sign in";
          return;
        }

        // Signed up but no session => email confirmation is ON in Supabase.
        if (mode === "signup" && res.data && !res.data.session) {
          showMsg("Account created. Check your email to confirm, then sign in.", "ok");
          $("submitBtn").disabled = false;
          $("submitBtn").textContent = "Create account";
          setMode("signin");
          return;
        }

        // We have a session — success.
        var dest = nextDest();
        if (dest) { window.location.href = dest; return; }
        showSignedIn(email);
      } catch (e) {
        showMsg("Something went wrong: " + (e.message || e), "err");
        $("submitBtn").disabled = false;
        $("submitBtn").textContent = mode === "signup" ? "Create account" : "Sign in";
      }
    }

    async function handleGoogle() {
      clearMsg();
      $("googleBtn").disabled = true;
      try {
        // Land where a normal signed-in user lands — the Desk — honoring ?next.
        // If the exact path isn't allow-listed in Supabase, it falls back to the
        // Site URL (root), whose signed-in redirect carries them to the Desk.
        var redirectTo = window.location.origin + (nextDest() || "/research.html");
        var res = await window.lidaAuth.signInWithGoogle(redirectTo);
        // On success the browser redirects to Google, so nothing below runs.
        if (res && res.error) {
          showMsg(res.error.message, "err");
          $("googleBtn").disabled = false;
        }
      } catch (e) {
        showMsg("Couldn't start Google sign-in: " + (e.message || e), "err");
        $("googleBtn").disabled = false;
      }
    }

    // wire up
    bindToggle();
    $("submitBtn").onclick = handleSubmit;
    $("googleBtn").onclick = handleGoogle;
    $("password").addEventListener("keydown", function (e) { if (e.key === "Enter") handleSubmit(); });
    $("signOutBtn") && ($("signOutBtn").onclick = async function () {
      await window.lidaAuth.signOut();
      window.location.reload();
    });

    // If already signed in, jump straight to the signed-in state.
    window.lidaAuth.getSession().then(function (session) {
      if (session && session.user) {
        var dest = nextDest();
        if (dest) { window.location.href = dest; return; }
        showSignedIn(session.user.email);
      }
    });
  </script>
</body>
</html>
