<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Li-Da · Research desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/lida.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(900px 620px at 78% -12%, rgba(143,176,214,0.12), transparent 60%),
      radial-gradient(820px 720px at 16% 112%, rgba(143,176,214,0.10), transparent 60%);
    background-attachment: fixed;
    color: var(--paper);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 8vh 20px 70px; -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 560px; }

  .eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--violet-soft); margin-bottom: 16px; }
  h1 {
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: clamp(32px, 7vw, 46px);
    line-height: 1.04; letter-spacing: -0.02em; margin-bottom: 12px;
    background: linear-gradient(118deg, var(--paper) 38%, var(--violet-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 15px; line-height: 1.55; margin-bottom: 34px; }

  .row { display: flex; gap: 10px; }
  input.symbol {
    flex: 1; background: rgba(20,24,38,0.6); border: 1px solid var(--line); border-radius: 12px;
    color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 16px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 15px 16px; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input.symbol:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(143,176,214,0.16); }
  input.symbol::placeholder { color: var(--muted); text-transform: none; letter-spacing: normal; }

  button.primary, .logbtn {
    background: linear-gradient(135deg, var(--violet), var(--violet-2));
    color: #0B0D14; border: none; border-radius: 12px;
    font-family: "Inter", sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
    box-shadow: 0 6px 24px -6px rgba(143,176,214,0.55);
  }
  button.primary { padding: 0 24px; }
  button.primary:hover, .logbtn:hover { filter: brightness(1.06); box-shadow: 0 8px 30px -6px rgba(143,176,214,0.7); }
  button.primary:disabled, .logbtn:disabled { opacity: 0.5; cursor: default; filter: none; box-shadow: none; }

  /* ---- glass cards ---- */
  .card, .read, .evidence, .move {
    margin-top: 16px; background: var(--panel);
    backdrop-filter: blur(16px) saturate(125%); -webkit-backdrop-filter: blur(16px) saturate(125%);
    border: 1px solid var(--line); border-radius: 18px; padding: 26px;
    box-shadow: 0 12px 44px -14px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .card { margin-top: 28px; }
  .card:hover, .read:hover, .evidence:hover, .move:hover {
    transform: translateY(-2px); border-color: rgba(143,176,214,0.22);
    box-shadow: 0 18px 54px -16px rgba(0,0,0,0.62), 0 0 0 1px rgba(143,176,214,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .show { opacity: 0; transform: translateY(10px); animation: rise 0.4s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  .card-eyebrow, .evidence h3, .move h3 { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .card-eyebrow { margin-bottom: 14px; }
  .evidence h3, .move h3 { margin-bottom: 18px; }

  /* ---- price card → premium hero ---- */
  .hero .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .hero .ident { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .hero .logo-tile { position: relative; width: 52px; height: 52px; border-radius: 12px; background: #F2F4F8; display: grid; place-items: center; flex: none; overflow: hidden; }
  .hero .logo-tile img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .hero .logo-tile .init { display: none; font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 20px; color: var(--bg); }
  .hero .logo-tile.noimg { background: rgba(255,255,255,0.06); border: 1px solid var(--line); }
  .hero .logo-tile.noimg .init { display: block; color: var(--accent); }
  .hero .name { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 18px; color: var(--ink); line-height: 1.2; }
  .hero .id-row { display: flex; align-items: center; gap: 9px; margin-top: 6px; flex-wrap: wrap; }
  .hero .ticker { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--violet-soft); letter-spacing: 0.1em; }
  .hero .sector { font-family: "Inter", sans-serif; font-size: 11px; color: var(--gold); background: rgba(203,176,129,0.10); border: 1px solid rgba(203,176,129,0.28); border-radius: 999px; padding: 2px 9px; white-space: nowrap; }
  .hero .quote { text-align: right; margin-left: auto; }
  .price { font-family: "IBM Plex Mono", monospace; font-size: 40px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .delta { font-family: "IBM Plex Mono", monospace; font-size: 14px; margin-top: 7px; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); }
  .hero .hero-spark { margin: 20px 0 2px; }
  .hero .hero-spark svg { width: 100%; height: 54px; display: block; overflow: visible; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 18px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat span:first-child { color: var(--muted); font-size: 11px; }
  .stat span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; font-size: 14px; color: var(--ink-dim); }
  .asof { margin-top: 14px; font-size: 11px; color: var(--muted); font-family: "IBM Plex Mono", monospace; letter-spacing: 0.04em; }
  @media (max-width: 520px) { .stats { grid-template-columns: repeat(2, 1fr); } .price { font-size: 34px; } }

  /* ---- the read ---- */
  .read.thinking { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 14px; }
  /* signature: the read signal — confidence ring + bull/bear meter */
  .signal2 { display: flex; align-items: center; gap: 20px; padding: 16px 18px; border-radius: 14px; background: rgba(143,176,214,0.05); border: 1px solid var(--line); margin-bottom: 16px; flex-wrap: wrap; }
  .ring { display: flex; flex-direction: column; align-items: center; gap: 7px; flex: none; }
  .dial { position: relative; width: 84px; height: 84px; }
  .dial svg { display: block; }
  .dial .rc { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
  .dial .rc b { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 13px; line-height: 1; }
  .ring .cap { font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .ring .cap b { font-weight: 500; }
  .sig-main { flex: 1; min-width: 220px; }
  .sig-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .sig-leanlabel { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .sig-lean { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 24px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink); }
  .meter-poles { display: flex; justify-content: space-between; font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
  .meter-poles .bear { color: var(--down); } .meter-poles .bull { color: var(--up); }
  .meter-track { position: relative; height: 8px; border-radius: 999px; background: linear-gradient(90deg, rgba(217,112,107,0.30), rgba(122,132,151,0.18), rgba(95,181,140,0.30)); }
  .meter-center { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: rgba(255,255,255,0.25); }
  .meter-marker { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: var(--ink); border: 2px solid var(--surface); box-shadow: 0 0 0 1px rgba(143,176,214,0.6); transform: translate(-50%,-50%); transition: left 0.5s cubic-bezier(.2,.7,.2,1); }

  .conf-reason { font-size: 13px; color: var(--muted); line-height: 1.45; margin-bottom: 18px; }
  .read-summary { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 20px; line-height: 1.36; margin-bottom: 22px; letter-spacing: -0.01em; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 520px) { .cols { grid-template-columns: 1fr; } }
  .col h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .col.bull h4 { color: var(--up); } .col.bear h4 { color: var(--down); }
  .col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .col li { font-size: 14px; line-height: 1.45; color: var(--paper); padding-left: 16px; position: relative; }
  .col li::before { content: ""; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; }
  .col.bull li::before { background: var(--up); } .col.bear li::before { background: var(--down); }
  .block { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
  .lab { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .block p { font-size: 14px; line-height: 1.5; }
  .act ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .act li { font-size: 14px; line-height: 1.45; padding-left: 16px; position: relative; color: var(--paper); }
  .act li::before { content: "\203A"; position: absolute; left: 0; color: var(--violet-soft); }
  .read-note { margin-top: 18px; font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }
  /* ---- stress test ---- */
  .stress .st-row { margin-bottom: 12px; }
  .stress .st-key { font-family: "IBM Plex Mono", monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--violet-soft); margin-bottom: 3px; }
  .stress .st-row p { font-size: 14px; line-height: 1.5; color: var(--paper); }
  .st-frag { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
  .frag-pill { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .frag-pill.low { color: var(--up); border-color: rgba(74,222,154,0.5); }
  .frag-pill.medium { color: var(--violet-soft); border-color: rgba(143,176,214,0.5); }
  .frag-pill.high { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .frag-reason { font-size: 13px; color: var(--muted); line-height: 1.4; }

  /* ---- evidence ---- */
  .figs { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 12px; }
  .fig { background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; display: flex; flex-direction: column; gap: 6px; }
  .fig span:first-child { color: var(--muted); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .fig span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; font-size: 18px; color: var(--ink); line-height: 1.15; word-break: break-word; }
  .analyst { margin-top: 4px; font-size: 14px; line-height: 1.5; }
  .analyst .bar { display: flex; height: 8px; border-radius: 999px; overflow: hidden; margin-top: 10px; background: rgba(255,255,255,0.06); }
  .analyst .bar i { display: block; height: 100%; }
  .analyst .bar .b { background: var(--up); } .analyst .bar .h { background: var(--muted); } .analyst .bar .s { background: var(--down); }
  /* ---- versus peers ---- */
  .peer-take { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .ptag { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(143,176,214,0.5); color: var(--violet-soft); white-space: nowrap; }
  .peer-take p { font-size: 14px; line-height: 1.5; color: var(--paper); flex: 1; min-width: 200px; }
  table.peers { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.peers th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 500; padding: 6px 0; border-bottom: 1px solid var(--line); }
  table.peers th:not(:first-child), table.peers td:not(:first-child) { text-align: right; }
  table.peers td { padding: 9px 0; border-bottom: 1px dotted var(--line); font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; color: var(--paper); }
  table.peers tr.target td { color: var(--violet-soft); }
  table.peers tr.target td:first-child { font-weight: 600; }

  /* ---- news take ---- */
  .nt-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .signal { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .signal.positive { color: var(--up); border-color: rgba(74,222,154,0.5); }
  .signal.negative { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .signal.mixed { color: var(--violet-soft); border-color: rgba(143,176,214,0.5); }
  .signal.quiet { color: var(--muted); border-color: var(--line); }
  .nt-headline { font-size: 15px; font-weight: 500; line-height: 1.4; }
  .nt-detail { font-size: 14px; line-height: 1.5; color: var(--paper); }
  .nt-matters { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .nt-matters li { font-size: 13px; line-height: 1.45; color: var(--muted); padding-left: 14px; position: relative; }
  .nt-matters li::before { content: "\00B7"; position: absolute; left: 2px; color: var(--violet-soft); font-weight: 700; }
  .sources { margin-top: 14px; }
  .sources summary { cursor: pointer; font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); list-style: none; padding: 6px 0; transition: color 0.15s; }
  .sources summary::-webkit-details-marker { display: none; }
  .sources summary:hover { color: var(--violet-soft); }
  .sources summary::before { content: "\25B8  "; }
  .sources[open] summary::before { content: "\25BE  "; }
  .news { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--line); }
  .news a { color: var(--paper); text-decoration: none; font-size: 14px; line-height: 1.45; display: block; transition: color 0.15s; }
  .news a:hover { color: var(--violet-soft); }
  .news .src { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px; }
  .empty { color: var(--muted); font-size: 14px; }

  /* ---- terminal chart ---- */
  .chart-card { margin-top: 16px; background: var(--panel); backdrop-filter: blur(16px) saturate(125%); -webkit-backdrop-filter: blur(16px) saturate(125%); border: 1px solid var(--line); border-radius: 18px; padding: 24px; position: relative; box-shadow: 0 12px 44px -14px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05); transition: transform 0.25s ease, border-color 0.25s ease; }
  .chart-card:hover { transform: translateY(-2px); border-color: rgba(143,176,214,0.22); }
  .chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
  .tfbar { display: flex; gap: 6px; }
  .tf { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; font-family: "IBM Plex Mono", monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .tf:hover { color: var(--paper); border-color: rgba(143,176,214,0.4); }
  .tf.active { background: rgba(143,176,214,0.15); border-color: var(--violet); color: var(--violet-soft); }
  .ohlc { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted); margin-bottom: 8px; min-height: 16px; display: flex; gap: 13px; flex-wrap: wrap; }
  .ohlc .oh b { color: var(--paper); font-weight: 500; }
  .ohlc .oh b.up { color: var(--up); } .ohlc .oh b.down { color: var(--down); }
  .ohlc .dt { margin-left: auto; }
  .chart-svg { width: 100%; height: auto; display: block; overflow: visible; cursor: crosshair; touch-action: none; }
  .gridline { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
  .sep { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .refline { stroke: rgba(255,255,255,0.12); stroke-width: 1; stroke-dasharray: 3 3; }
  .curline { stroke: var(--violet); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.7; }
  .crossv { stroke: rgba(255,255,255,0.28); stroke-width: 1; }
  .axlbl { fill: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 10px; }
  .curlbl { fill: var(--violet-soft); font-family: "IBM Plex Mono", monospace; font-size: 10px; font-weight: 600; }
  .panlbl { fill: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .ma20 { fill: var(--violet-soft); } .ma50 { fill: #7FB3D5; }
  .lvl { stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.85; }
  .lvl.entry { stroke: var(--violet-soft); } .lvl.stop { stroke: var(--down); } .lvl.target { stroke: var(--up); }
  .lvllbl { font-family: "IBM Plex Mono", monospace; font-size: 9px; }
  .lvllbl.entry { fill: var(--violet-soft); } .lvllbl.stop { fill: var(--down); } .lvllbl.target { fill: var(--up); }
  .chart-loading { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 14px; padding: 40px 0; text-align: center; }
  .chart-empty { color: var(--muted); font-size: 14px; padding: 30px 0; text-align: center; }

  /* ---- red flags ---- */
  .rf-count { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--down); border: 1px solid rgba(255,107,107,0.4); border-radius: 999px; padding: 1px 8px; margin-left: 8px; }
  .rf-list { display: flex; flex-direction: column; gap: 11px; }
  .rf-item { display: flex; gap: 10px; align-items: flex-start; }
  .rf-sev { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); white-space: nowrap; margin-top: 1px; }
  .rf-sev.high { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .rf-sev.medium { color: #F5B870; border-color: rgba(245,184,112,0.5); }
  .rf-sev.low { color: var(--muted); }
  .rf-label { font-size: 14px; font-weight: 500; }
  .rf-detail { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 2px; }
  .rf-caveat { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 13px; font-style: italic; }
  .rf-clear { color: var(--up); font-size: 14px; line-height: 1.5; }
  /* ---- earnings & execution ---- */
  .ea-next { font-size: 14px; margin-bottom: 10px; }
  .ea-next b { font-family: "IBM Plex Mono", monospace; }
  .ea-next.soon { color: #F5B870; }
  .ea-next.muted { color: var(--muted); }
  .ea-hist { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .ea-q { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.04em; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--line); }
  .ea-q.beat { color: var(--up); border-color: rgba(74,222,154,0.4); }
  .ea-q.miss { color: var(--down); border-color: rgba(255,107,107,0.4); }
  .ea-record { font-size: 13px; color: var(--muted); }
  .ea-record b { color: var(--paper); }
  /* ---- insider activity ---- */
  .ins-win { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); margin-left: 8px; }
  .ins-head { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .ins-head.up { color: var(--up); }
  .ins-head.warn { color: #F5B870; }
  .ins-head.neutral { color: var(--muted); }
  .ins-detail { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0 0 8px; }

  /* ---- technicals ---- */
  .tech-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .tchip { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .tchip.up { color: var(--up); border-color: rgba(74,222,154,0.5); }
  .tchip.down { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .tchip.sideways { color: var(--violet-soft); border-color: rgba(143,176,214,0.4); }
  .tchip.hot { color: #F5B870; border-color: rgba(245,184,112,0.55); }
  .tchip.regime { color: var(--violet-soft); border-color: rgba(143,176,214,0.4); }
  .tstat { color: var(--muted); font-size: 13px; }
  .tstat b { font-family: "IBM Plex Mono", monospace; color: var(--paper); font-weight: 500; }
  .tstat b.up { color: var(--up); } .tstat b.down { color: var(--down); }

  /* ---- your move ---- */
  .movesub { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
  .seg { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .seg button { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 500; font-family: "Inter", sans-serif; cursor: pointer; transition: all 0.15s; }
  .seg button:hover { border-color: rgba(143,176,214,0.4); color: var(--paper); }
  .seg button.active { background: rgba(143,176,214,0.15); border-color: var(--violet); color: var(--violet-soft); }
  .fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  @media (max-width: 480px) { .fields { grid-template-columns: 1fr; } }
  .fields label { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .fields input { background: rgba(11,13,20,0.6); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 15px; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  .fields input:focus { border-color: var(--violet); }
  .rr { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
  .rr.good { color: var(--up); } .rr.bad { color: var(--down); }
  .reason { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .reason textarea { background: rgba(11,13,20,0.6); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "Inter", sans-serif; font-size: 14px; padding: 12px; outline: none; resize: vertical; line-height: 1.5; transition: border-color 0.15s; }
  .reason textarea:focus { border-color: var(--violet); }
  .logbtn { width: 100%; height: 48px; }
  .logmsg { margin-top: 14px; font-size: 14px; line-height: 1.5; }
  .logmsg.ok { color: var(--up); }
  .logmsg.err { color: var(--down); }

  .error { margin-top: 16px; color: var(--down); font-size: 15px; }
  .foot { margin-top: 44px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 20px; line-height: 1.5; }

  @media (prefers-reduced-motion: reduce) {
    .show { animation: none; opacity: 1; transform: none; }
    .signal-module.conf-high { animation: none; }
    * { transition: none !important; }
  }

  /* ---- immersive: living ambient glow ---- */
  body::before {
    content: ""; position: fixed; inset: -20%; z-index: -1; pointer-events: none;
    background:
      radial-gradient(600px 480px at 30% 22%, rgba(143,176,214,0.10), transparent 60%),
      radial-gradient(560px 520px at 72% 78%, rgba(143,176,214,0.08), transparent 60%);
    animation: lida-drift 26s ease-in-out infinite alternate;
  }
  @keyframes lida-drift {
    0%   { transform: translate3d(0,0,0) scale(1); opacity: 0.8; }
    100% { transform: translate3d(2%, -2%, 0) scale(1.06); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }

  /* ---- immersive: analyzing shimmer ---- */
  .read.thinking { position: relative; overflow: hidden; color: var(--violet-soft); font-family: "IBM Plex Mono", monospace; font-size: 14px; }
  .read.thinking::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(100deg, transparent 18%, rgba(143,176,214,0.12) 50%, transparent 82%);
    transform: translateX(-100%); animation: lida-scan 1.6s ease-in-out infinite;
  }
  @keyframes lida-scan { to { transform: translateX(100%); } }
  @media (prefers-reduced-motion: reduce) { .read.thinking::after { animation: none; } }

  /* ---- full-page two-column desk (wide screens only) ---- */
  @media (min-width: 980px) {
    .wrap { max-width: 1180px; }
    .wrap > .eyebrow, .wrap > h1, .wrap > .sub, .wrap > .row, .wrap > .foot {
      max-width: 680px; margin-left: auto; margin-right: auto;
    }
    .wrap > .eyebrow, .wrap > h1, .wrap > .sub { text-align: center; }
    .wrap > .row { justify-content: center; }
    #out {
      display: grid; grid-template-columns: 1.32fr 1fr; gap: 16px; align-items: start;
      grid-template-areas:
        "price    read"
        "chart    read"
        "evidence move";
    }
    #out > * { margin-top: 0; }
    #out > .card       { grid-area: price; }
    #out > .chart-card { grid-area: chart; }
    #out > .read       { grid-area: read; }
    #out > .evidence   { grid-area: evidence; }
    #out > .move       { grid-area: move; }
  }

</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Li-Da · research desk</div>
    <h1>Pull a read.</h1>
    <p class="sub">A live quote, an honest read, the news distilled — then you set your exits and log the call.</p>

    <div class="row">
      <input id="symbol" class="symbol" placeholder="Ticker, e.g. AAPL" autocomplete="off" spellcheck="false" />
      <button id="go" class="primary">Get read</button>
    </div>

    <div id="out"></div>

    <p class="foot">Data and reasoning, never a verdict. The call is always yours.</p>
  </div>

<script>
  // Require sign-in before the Desk loads.
  (async function () { if (window.lidaAuth) { await window.lidaAuth.requireAuth(); } })();
  const input = document.getElementById("symbol");
  const btn = document.getElementById("go");
  const out = document.getElementById("out");
  let ctx = null;
  let chartSym = null;
  let chartRange = "3m";
  let chartGeo = null;
  let chartLogs = [];

  function money(n) { return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function fmtCap(millions) {
    if (millions == null) return null;
    const v = millions * 1e6;
    if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
    if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
    return "$" + (v / 1e6).toFixed(0) + "M";
  }
  const num = (n, d = 2) => (n == null ? null : Number(n).toFixed(d));
  const pct = (n) => (n == null ? null : Number(n).toFixed(1) + "%");

  function priceCard(d) {
    const up = d.change >= 0;
    const arrow = up ? "\u25B2" : "\u25BC";
    const sign = up ? "+" : "";
    const initials = String(d.symbol || "?").slice(0, 2).toUpperCase();
    const tile = d.logo
      ? `<div class="logo-tile"><img src="${esc(d.logo)}" alt="" referrerpolicy="no-referrer" onerror="this.remove(); this.closest('.logo-tile').classList.add('noimg');" /><span class="init">${esc(initials)}</span></div>`
      : `<div class="logo-tile noimg"><span class="init">${esc(initials)}</span></div>`;
    const sector = d.industry ? `<span class="sector">${esc(d.industry)}</span>` : "";
    return `
      <div class="card hero show">
        <div class="hero-top">
          <div class="ident">
            ${tile}
            <div class="id-text">
              <div class="name">${esc(d.name)}</div>
              <div class="id-row">
                <span class="ticker">${esc(d.symbol)}</span>
                ${sector}
              </div>
            </div>
          </div>
          <div class="quote">
            <div class="price">${money(d.price)}</div>
            <div class="delta ${up ? "up" : "down"}">${arrow} ${sign}${money(d.change)} (${sign}${d.percent.toFixed(2)}%)</div>
          </div>
        </div>
        <div class="hero-spark">
          <svg id="herospark" viewBox="0 0 600 54" preserveAspectRatio="none" aria-hidden="true"></svg>
        </div>
        <div class="stats">
          <div class="stat"><span>Open</span><span>${money(d.open)}</span></div>
          <div class="stat"><span>Prev close</span><span>${money(d.prevClose)}</span></div>
          <div class="stat"><span>Day high</span><span>${money(d.high)}</span></div>
          <div class="stat"><span>Day low</span><span>${money(d.low)}</span></div>
        </div>
        <div class="asof">as of ${new Date(d.asOf).toLocaleString()}</div>
      </div>`;
  }

  // Paints the hero's sparkline from the SAME /api/chart points the candlestick chart uses.
  // Called by loadChart after a successful fetch — no extra API call.
  function drawHeroSpark(points) {
    const el = document.getElementById("herospark");
    if (!el) return;
    const closes = (points || []).map((p) => p.close).filter((v) => typeof v === "number" && !isNaN(v));
    if (closes.length < 2) { el.innerHTML = ""; return; }
    const W = 600, H = 54, pad = 5;
    const min = Math.min.apply(null, closes), max = Math.max.apply(null, closes);
    const span = (max - min) || 1, n = closes.length;
    const xAt = (i) => (i / (n - 1)) * W;
    const yAt = (v) => pad + (1 - (v - min) / span) * (H - pad * 2);
    let line = "";
    for (let i = 0; i < n; i++) line += (i ? "L" : "M") + xAt(i).toFixed(1) + " " + yAt(closes[i]).toFixed(1) + " ";
    const area = line + "L" + W + " " + H + " L0 " + H + " Z";
    const upTrend = closes[n - 1] >= closes[0];
    const stroke = upTrend ? "var(--up)" : "var(--down)";
    const fill = upTrend ? "rgba(95,181,140,0.12)" : "rgba(217,112,107,0.12)";
    el.innerHTML =
      '<path d="' + area + '" fill="' + fill + '"></path>' +
      '<path d="' + line + '" fill="none" stroke="' + stroke + '" stroke-width="2" vector-effect="non-scaling-stroke"></path>';
  }

  function renderRead(r) {
    const bull = (r.bull || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const bear = (r.bear || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const act = (r.before_you_act || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const st = r.stress_test;
    const stressHtml = st
      ? `<div class="block stress">
          <div class="lab">Stress test</div>
          <div class="st-row"><div class="st-key">Load-bearing assumption</div><p>${esc(st.load_bearing || "—")}</p></div>
          <div class="st-row"><div class="st-key">Kill switch</div><p>${esc(st.kill_switch || "—")}</p></div>
          <div class="st-row"><div class="st-key">Reality check</div><p>${esc(st.base_rate || "—")}</p></div>
          <div class="st-frag">
            <span class="frag-pill ${esc((st.fragility || "").toLowerCase())}">${esc(st.fragility || "—")} fragility</span>
            <span class="frag-reason">${esc(st.fragility_reason || "")}</span>
          </div>
        </div>`
      : "";
    const conf = (r.confidence || "low").toLowerCase();
    const ringCol = { low: "var(--accent-deep)", medium: "var(--accent)", high: "var(--gold)" }[conf] || "var(--accent)";
    const confWord = conf.charAt(0).toUpperCase() + conf.slice(1);
    const litCount = { low: 1, medium: 2, high: 3 }[conf] || 1;
    let ringSegs = "";
    for (let i = 0; i < 3; i++) {
      const segCol = i < litCount ? ringCol : "rgba(255,255,255,0.09)";
      ringSegs += `<circle cx="42" cy="42" r="34" fill="none" stroke="${segCol}" stroke-width="6" stroke-dasharray="61.2 152.4" transform="rotate(${-82 + i * 120} 42 42)"></circle>`;
    }
    const lean = (r.lean || "hold").toLowerCase();
    const leanDir = lean === "buy" ? 1 : lean === "sell" ? -1 : 0;
    const confMag = { low: 0.4, medium: 0.7, high: 1 }[conf] || 0.4;
    const markerPct = Math.round((((leanDir * confMag) + 1) / 2) * 100);
    return `
      <div class="read show">
        <div class="card-eyebrow">The read</div>
        <div class="signal2">
          <div class="ring">
            <div class="dial">
              <svg viewBox="0 0 84 84" width="84" height="84" aria-hidden="true">${ringSegs}</svg>
              <div class="rc"><b style="color:${ringCol}">${esc(confWord)}</b></div>
            </div>
            <div class="cap"><b style="color:${ringCol}">${litCount} of 3</b> · confidence</div>
          </div>
          <div class="sig-main">
            <div class="sig-top"><span class="sig-leanlabel">Li-Da leans</span><span class="sig-lean">${esc(r.lean || "\u2014")}</span></div>
            <div class="meter-poles"><span class="bear">Bear</span><span class="bull">Bull</span></div>
            <div class="meter-track">
              <div class="meter-center"></div>
              <div class="meter-marker" style="left:${markerPct}%"></div>
            </div>
          </div>
        </div>
        <div class="conf-reason">${esc(r.confidence_reason || "")}</div>
        <div class="read-summary">${esc(r.summary || "")}</div>
        <div class="cols">
          <div class="col bull"><h4>Bull case</h4><ul>${bull}</ul></div>
          <div class="col bear"><h4>Bear case</h4><ul>${bear}</ul></div>
        </div>
        ${stressHtml}
        <div class="block"><div class="lab">Levels to watch</div><p>${esc(r.levels || "—")}</p></div>
        <div class="block act"><div class="lab">Before you act</div><ul>${act}</ul></div>
        <div class="read-note">Reasoning, not advice. You decide.</div>
      </div>`;
  }

  function renderEvidence(d) {
    const f = d.figures || {};
    const rows = [];
    const cap = fmtCap(f.marketCap); if (cap) rows.push(["Market cap", cap]);
    if (num(f.pe) != null) rows.push(["P/E (TTM)", num(f.pe)]);
    if (f.low52 != null && f.high52 != null) rows.push(["52-week range", money(f.low52) + " – " + money(f.high52)]);
    if (pct(f.profitMargin) != null) rows.push(["Profit margin", pct(f.profitMargin)]);
    if (pct(f.revGrowth) != null) rows.push(["Revenue growth", pct(f.revGrowth)]);
    if (num(f.debtToEquity) != null) rows.push(["Debt / equity", num(f.debtToEquity)]);
    if (num(f.currentRatio) != null) rows.push(["Current ratio", num(f.currentRatio)]);
    if (num(f.eps) != null) rows.push(["EPS (TTM)", "$" + num(f.eps)]);

    const figsHtml = rows.length
      ? `<div class="figs">${rows.map((r) => `<div class="fig"><span>${esc(r[0])}</span><span>${esc(r[1])}</span></div>`).join("")}</div>`
      : `<p class="empty">No fundamentals available for this ticker.</p>`;

    // versus peers
    const peers = d.peers || [];
    const pt = (d.read && d.read.peer_take) || null;
    let peersHtml = "";
    if (peers.length > 1) {
      const prows = peers.map((p) => `
        <tr class="${p.isTarget ? "target" : ""}">
          <td>${esc(p.symbol)}</td>
          <td>${p.pe != null ? num(p.pe) : "—"}</td>
          <td>${p.margin != null ? pct(p.margin) : "—"}</td>
        </tr>`).join("");
      const tag = pt ? `<span class="ptag">${esc(pt.relative || "vs peers")}</span>` : "";
      const detail = pt ? `<p>${esc(pt.detail || "")}</p>` : "";
      peersHtml = `
        <div class="block">
          <div class="lab">Versus peers</div>
          <div class="peer-take">${tag}${detail}</div>
          <table class="peers">
            <thead><tr><th>Ticker</th><th>P/E</th><th>Margin</th></tr></thead>
            <tbody>${prows}</tbody>
          </table>
        </div>`;
    } else if (pt && pt.detail) {
      peersHtml = `<div class="block"><div class="lab">Versus peers</div><p class="empty">${esc(pt.detail)}</p></div>`;
    }

    // red flags (objective warning signs from the fundamentals)
    const rf = d.redFlags || null;
    let rfHtml = "";
    if (rf) {
      if (rf.flags && rf.flags.length) {
        const items = rf.flags.map((fl) => `
          <div class="rf-item">
            <span class="rf-sev ${esc(fl.severity)}">${esc(fl.severity)}</span>
            <div class="rf-body"><div class="rf-label">${esc(fl.label)}</div><div class="rf-detail">${esc(fl.detail)}</div></div>
          </div>`).join("");
        rfHtml = `
          <div class="block">
            <div class="lab">Red flags <span class="rf-count">${rf.flags.length}</span></div>
            <div class="rf-list">${items}</div>
            <p class="rf-caveat">From the financial metrics available — not a full forensic audit (no filings, accounting footnotes, or legal review).</p>
          </div>`;
      } else {
        rfHtml = `
          <div class="block">
            <div class="lab">Red flags</div>
            <p class="rf-clear">No major red flags in the available financials — based on the metrics only, not a full audit.</p>
          </div>`;
      }
    }

    // technicals snapshot (the trend Li-Da now reads)
    const t = d.technicals || null;
    let techHtml = "";
    if (t) {
      const ma50dir = t.priceVsMA50 != null ? (t.priceVsMA50 >= 0 ? "up" : "down") : "";
      const ma50txt = t.priceVsMA50 != null ? `<span class="tstat">vs MA50 <b class="${ma50dir}">${t.priceVsMA50 >= 0 ? "+" : ""}${t.priceVsMA50}%</b></span>` : "";
      const rsiTxt = t.rsi != null ? `<span class="tstat">RSI <b>${t.rsi}</b> · ${esc(t.rsiState)}</span>` : "";
      const offHi = t.pctOffHigh != null ? `<span class="tstat">off high <b>${t.pctOffHigh}%</b></span>` : "";
      const hy = d.hype || null;
      const hotChip = (hy && hy.hot) ? `<span class="tchip hot">running hot</span>` : "";
      techHtml = `
        <div class="block">
          <div class="lab">Technicals</div>
          <div class="tech-row">
            <span class="tchip ${esc(t.trend)}">${esc(t.trend)}</span>${hotChip}
            ${rsiTxt}${ma50txt}${offHi}
          </div>
        </div>`;
    }

    // market regime (trend + volatility + volume)
    const rg = d.regime || null;
    let regimeHtml = "";
    if (rg) {
      const volMove = rg.avg_daily_move_pct != null ? ` · ~${rg.avg_daily_move_pct}%/day` : "";
      regimeHtml = `
        <div class="block">
          <div class="lab">Market regime</div>
          <div class="tech-row">
            <span class="tchip regime">${esc(rg.label)}</span>
            <span class="tstat">volatility <b>${esc(rg.volatility_state)}</b>${volMove}</span>
            <span class="tstat">volume <b>${esc(rg.volume_state)}</b></span>
          </div>
        </div>`;
    }

    let analystHtml = "";
    const a = d.analyst;
    if (a) {
      const buy = a.strongBuy + a.buy, hold = a.hold, sell = a.sell + a.strongSell;
      const total = buy + hold + sell || 1;
      const label = buy > sell ? "Buy-leaning" : sell > buy ? "Sell-leaning" : "Mixed";
      analystHtml = `
        <div class="block">
          <div class="lab">Analyst consensus${a.period ? " · " + esc(a.period) : ""}</div>
          <div class="analyst">${label} — ${buy} buy · ${hold} hold · ${sell} sell
            <div class="bar">
              <i class="b" style="width:${(buy / total) * 100}%"></i>
              <i class="h" style="width:${(hold / total) * 100}%"></i>
              <i class="s" style="width:${(sell / total) * 100}%"></i>
            </div>
          </div>
        </div>`;
    }

    const nt = (d.read && d.read.news_take) || null;
    const news = d.news || [];
    const sig = (nt && nt.signal) || "quiet";
    const matters = (nt && nt.what_matters ? nt.what_matters : []).map((x) => `<li>${esc(x)}</li>`).join("");
    const sourceItems = news.length
      ? news.map((n) => {
          const date = n.datetime ? new Date(n.datetime * 1000).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
          const meta = [n.source, date].filter(Boolean).map(esc).join(" · ");
          const inner = `<span class="src">${meta}</span>${esc(n.headline)}`;
          return n.url ? `<a href="${esc(n.url)}" target="_blank" rel="noopener">${inner}</a>` : `<a>${inner}</a>`;
        }).join("")
      : `<p class="empty">No recent news in the last 7 days.</p>`;

    const newsHtml = `
      <div class="block">
        <div class="lab">What the news says</div>
        <div class="nt-head">
          <span class="signal ${esc(sig)}">${esc(sig)}</span>
          <span class="nt-headline">${esc(nt ? nt.headline : "No clear signal")}</span>
        </div>
        <p class="nt-detail">${esc(nt ? nt.detail : "")}</p>
        ${matters ? `<ul class="nt-matters">${matters}</ul>` : ""}
        <details class="sources"><summary>Sources (${news.length})</summary><div class="news">${sourceItems}</div></details>
      </div>`;

    // earnings & execution (next date + beat/miss record)
    const ea = d.earnings || null;
    let earnHtml = "";
    if (ea && (ea.next_date || (ea.history && ea.history.length))) {
      const soon = ea.days_to != null && ea.days_to <= 14 && ea.days_to >= 0;
      let dateLine;
      if (ea.next_date) {
        const dl = new Date(ea.next_date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        const days = ea.days_to != null ? ` · in ${ea.days_to} day${ea.days_to === 1 ? "" : "s"}` : "";
        dateLine = `<div class="ea-next ${soon ? "soon" : ""}">Next earnings: <b>${esc(dl)}</b>${days}${soon ? " · binary event soon" : ""}</div>`;
      } else {
        dateLine = `<div class="ea-next muted">Next earnings date not available on this data tier.</div>`;
      }
      const hist = (ea.history || []).map((q) => {
        if (q.beat == null) return "";
        const sp = q.surprisePercent != null ? ` ${q.surprisePercent >= 0 ? "+" : ""}${q.surprisePercent.toFixed(1)}%` : "";
        return `<span class="ea-q ${q.beat ? "beat" : "miss"}">${q.beat ? "beat" : "miss"}${sp}</span>`;
      }).join("");
      const record = ea.total ? `<div class="ea-record">Beaten estimates in <b>${ea.beats} of ${ea.total}</b> recent quarters</div>` : "";
      earnHtml = `
        <div class="block">
          <div class="lab">Earnings & execution</div>
          ${dateLine}
          ${hist ? `<div class="ea-hist">${hist}</div>` : ""}
          ${record}
          <p class="rf-caveat">Execution measured as reported EPS vs analyst estimates — one lens, not the whole story.</p>
        </div>`;
    }

    // insider activity (open-market Form 4 trades — only if on this data tier)
    const ins = d.insider || null;
    let insiderHtml = "";
    if (ins && ins.available) {
      const fmtSh = (n) => {
        n = Number(n);
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
        if (n >= 1e3) return Math.round(n / 1e3) + "K";
        return String(n);
      };
      let headline, cls, detail;
      if (ins.signal === "buying" || ins.signal === "net_buying") {
        cls = "up"; headline = "Insiders buying";
        detail = `Insiders bought ~${fmtSh(ins.bought)} shares across ${ins.buyTxns} open-market trade${ins.buyTxns === 1 ? "" : "s"}${ins.sellTxns ? ` (vs ${fmtSh(ins.sold)} sold)` : ""}. Insiders rarely buy with their own money unless they're optimistic — a mild positive.`;
      } else if (ins.signal === "selling" || ins.signal === "net_selling") {
        cls = "warn"; headline = "Insiders selling";
        detail = `Insiders sold ~${fmtSh(ins.sold)} shares across ${ins.sellTxns} open-market trade${ins.sellTxns === 1 ? "" : "s"}${ins.buyTxns ? ` (vs ${fmtSh(ins.bought)} bought)` : ""}. Selling has many benign reasons (taxes, diversification, scheduled plans) — context, not a verdict.`;
      } else {
        cls = "neutral"; headline = "Mixed insider activity";
        detail = `Roughly balanced over the window: ~${fmtSh(ins.bought)} bought vs ~${fmtSh(ins.sold)} sold.`;
      }
      insiderHtml = `
        <div class="block">
          <div class="lab">Insider activity <span class="ins-win">${esc(ins.window)}</span></div>
          <div class="ins-head ${cls}">${esc(headline)}</div>
          <p class="ins-detail">${esc(detail)}</p>
          <p class="rf-caveat">Open-market Form 4 trades only (grants and option exercises excluded). Context, never a copy signal.</p>
        </div>`;
    }

    return `<div class="evidence show"><h3>What it read</h3>${figsHtml}${rfHtml}${techHtml}${regimeHtml}${peersHtml}${analystHtml}${earnHtml}${insiderHtml}${newsHtml}</div>`;
  }

  function updateRR() {
    const e = parseFloat(document.getElementById("f-entry").value);
    const s = parseFloat(document.getElementById("f-stop").value);
    const t = parseFloat(document.getElementById("f-target").value);
    const el = document.getElementById("rr");
    if (isNaN(e) || isNaN(s) || isNaN(t)) { el.textContent = ""; el.className = "rr"; return; }
    const risk = Math.abs(e - s), reward = Math.abs(t - e);
    if (risk === 0) { el.textContent = "Stop can't equal entry."; el.className = "rr bad"; return; }
    const rr = reward / risk;
    el.textContent = `Risk : Reward ≈ 1 : ${rr.toFixed(1)}`;
    el.className = "rr " + (rr >= 2 ? "good" : rr < 1 ? "bad" : "");
  }

  async function logDecision() {

  function fmtD(d) {
    try { return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
    catch (e) { return d; }
  }
  function sma(a, p) {
    const out = new Array(a.length).fill(null);
    let sum = 0;
    for (let i = 0; i < a.length; i++) { sum += a[i]; if (i >= p) sum -= a[i - p]; if (i >= p - 1) out[i] = sum / p; }
    return out;
  }
  function rsi14(a) {
    const p = 14, out = new Array(a.length).fill(null);
    if (a.length <= p) return out;
    let g = 0, l = 0;
    for (let i = 1; i <= p; i++) { const d = a[i] - a[i - 1]; if (d >= 0) g += d; else l -= d; }
    let ag = g / p, al = l / p;
    out[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    for (let i = p + 1; i < a.length; i++) {
      const d = a[i] - a[i - 1], gg = d > 0 ? d : 0, ll = d < 0 ? -d : 0;
      ag = (ag * (p - 1) + gg) / p; al = (al * (p - 1) + ll) / p;
      out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }
    return out;
  }

  function chartShell(range, inner) {
    const tfs = [["1m", "1M"], ["3m", "3M"], ["6m", "6M"], ["1y", "1Y"]];
    const btns = tfs.map(([v, l]) => `<button class="tf ${v === range ? "active" : ""}" data-r="${v}">${l}</button>`).join("");
    return `
      <div class="chart-top">
        <span class="card-eyebrow" style="margin:0">Price</span>
        <div class="tfbar">${btns}</div>
      </div>
      <div class="ohlc" id="ohlc"></div>
      <div class="chart-plot">${inner}</div>`;
  }

  function renderTerminal(d) {
    const points = d.points, display = d.display, L = points.length;
    const start = Math.max(0, L - display);
    const vis = points.slice(start);
    const N = vis.length;
    const closes = points.map((p) => p.close);
    const s20 = sma(closes, 20), s50 = sma(closes, 50), rsi = rsi14(closes);
    const current = ctx && ctx.price != null ? ctx.price : closes[L - 1];

    const W = 700, H = 380, padL = 6, padR = 52;
    const priceTop = 24, priceH = 176, priceBot = priceTop + priceH;
    const volTop = 214, volH = 44, volBot = volTop + volH;
    const rsiTop = 282, rsiH = 64, rsiBot = rsiTop + rsiH;
    const plotW = W - padL - padR, slot = plotW / N, bodyW = Math.max(1, slot * 0.66);
    const xC = (k) => padL + (k + 0.5) * slot;

    let pMin = Infinity, pMax = -Infinity;
    vis.forEach((p) => { pMin = Math.min(pMin, p.low); pMax = Math.max(pMax, p.high); });
    for (let k = 0; k < N; k++) { const fi = start + k;[s20[fi], s50[fi]].forEach((v) => { if (v != null) { pMin = Math.min(pMin, v); pMax = Math.max(pMax, v); } }); }
    if (current != null) { pMin = Math.min(pMin, current); pMax = Math.max(pMax, current); }
    if (chartLogs && chartLogs.length) {
      const rc = chartLogs[0];
      [rc.entry, rc.stop_loss, rc.take_profit].forEach((v) => { if (v != null) { pMin = Math.min(pMin, Number(v)); pMax = Math.max(pMax, Number(v)); } });
    }
    const pPad = ((pMax - pMin) || 1) * 0.06; pMin -= pPad; pMax += pPad;
    const pY = (v) => priceTop + (1 - (v - pMin) / (pMax - pMin)) * priceH;

    let vMax = 0; vis.forEach((p) => { vMax = Math.max(vMax, p.volume); });
    const vY = (v) => volBot - (vMax ? v / vMax : 0) * volH;
    const rY = (v) => rsiTop + (1 - v / 100) * rsiH;

    let candles = "", vols = "";
    for (let k = 0; k < N; k++) {
      const p = vis[k], x = xC(k), up = p.close >= p.open, col = up ? "var(--up)" : "var(--down)";
      const yo = pY(p.open), yc = pY(p.close), top = Math.min(yo, yc), bh = Math.max(1, Math.abs(yo - yc));
      candles += `<line x1="${x.toFixed(1)}" y1="${pY(p.high).toFixed(1)}" x2="${x.toFixed(1)}" y2="${pY(p.low).toFixed(1)}" stroke="${col}" stroke-width="1"/>`;
      candles += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${top.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`;
      const vy = vY(p.volume);
      vols += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${vy.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${(volBot - vy).toFixed(1)}" fill="${col}" opacity="0.3"/>`;
    }

    function maPath(arr) {
      let dstr = "", started = false;
      for (let k = 0; k < N; k++) { const v = arr[start + k]; if (v == null) continue; const x = xC(k), y = pY(v); dstr += (started ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; started = true; }
      return dstr;
    }
    const ma20 = maPath(s20), ma50 = maPath(s50);

    let rsiPath = "", st = false;
    for (let k = 0; k < N; k++) { const v = rsi[start + k]; if (v == null) continue; const x = xC(k), y = rY(v); rsiPath += (st ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; st = true; }

    // price gridlines + labels
    let grid = "";
    for (let i = 0; i <= 3; i++) {
      const val = pMin + (i / 3) * (pMax - pMin), y = pY(val);
      grid += `<line class="gridline" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/>`;
      grid += `<text class="axlbl" x="${W - padR + 4}" y="${(y + 3).toFixed(1)}">${val.toFixed(2)}</text>`;
    }
    // current price line + label
    const cy = pY(current);
    const curMark = `<line class="curline" x1="${padL}" y1="${cy.toFixed(1)}" x2="${W - padR}" y2="${cy.toFixed(1)}"/>
      <text class="curlbl" x="${W - padR + 4}" y="${(cy + 3).toFixed(1)}">${current.toFixed(2)}</text>
      <circle cx="${xC(N - 1).toFixed(1)}" cy="${cy.toFixed(1)}" r="3" fill="var(--violet-2)"/>`;

    // rsi reference lines
    const rsiRef = [30, 70].map((lv) => `<line class="refline" x1="${padL}" y1="${rY(lv).toFixed(1)}" x2="${W - padR}" y2="${rY(lv).toFixed(1)}"/><text class="axlbl" x="${W - padR + 4}" y="${(rY(lv) + 3).toFixed(1)}">${lv}</text>`).join("");

    // x date labels
    let dates = "";
    [0, Math.floor((N - 1) / 2), N - 1].forEach((k) => {
      const x = Math.min(W - padR - 20, Math.max(padL, xC(k)));
      dates += `<text class="axlbl" x="${x.toFixed(1)}" y="372" text-anchor="middle">${fmtD(vis[k].date)}</text>`;
    });

    // separators + panel labels + legend
    const sep = `<line class="sep" x1="${padL}" y1="${volTop - 6}" x2="${W - padR}" y2="${volTop - 6}"/><line class="sep" x1="${padL}" y1="${rsiTop - 6}" x2="${W - padR}" y2="${rsiTop - 6}"/>`;
    const labels = `<text class="panlbl" x="${padL}" y="${volTop + 8}">Volume</text><text class="panlbl" x="${padL}" y="${rsiTop + 8}">RSI 14</text>`;
    const legend = `<text class="panlbl ma20" x="${padL}" y="${priceTop - 8}">— MA20</text><text class="panlbl ma50" x="${padL + 54}" y="${priceTop - 8}">— MA50</text>`;

    // --- your logged calls overlaid on the candles ---
    let overlay = "";
    if (chartLogs && chartLogs.length) {
      const lvl = (val, cls, label) => {
        if (val == null) return "";
        const v = Number(val);
        if (v < pMin || v > pMax) return "";
        const y = pY(v);
        return `<line class="lvl ${cls}" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/><text class="lvllbl ${cls}" x="${(padL + 2)}" y="${(y - 3).toFixed(1)}">${label} ${v.toFixed(2)}</text>`;
      };
      const rc = chartLogs[0];
      overlay += lvl(rc.entry, "entry", "entry");
      overlay += lvl(rc.stop_loss, "stop", "stop");
      overlay += lvl(rc.take_profit, "target", "target");

      const idxByDate = (d) => {
        const ld = String(d).slice(0, 10);
        if (ld < vis[0].date) return -1;
        let idx = -1;
        for (let k = 0; k < N; k++) { if (vis[k].date <= ld) idx = k; else break; }
        return idx;
      };
      chartLogs.forEach((lg) => {
        const k = idxByDate(lg.created_at);
        if (k < 0) return;
        const x = xC(k), dec = (lg.decision || "").toLowerCase();
        if (dec === "buy") {
          const y = pY(vis[k].low) + 11;
          overlay += `<path d="M ${x.toFixed(1)} ${(y - 7).toFixed(1)} l 4 7 l -8 0 z" fill="var(--up)"/>`;
        } else if (dec === "sell") {
          const y = pY(vis[k].high) - 11;
          overlay += `<path d="M ${x.toFixed(1)} ${(y + 7).toFixed(1)} l 4 -7 l -8 0 z" fill="var(--down)"/>`;
        } else {
          overlay += `<circle cx="${x.toFixed(1)}" cy="${pY(vis[k].close).toFixed(1)}" r="3" fill="var(--violet-soft)"/>`;
        }
      });
    }

    chartGeo = { vis, N, start, padL, slot, W };

    const svg = `
      <svg viewBox="0 0 ${W} ${H}" class="chart-svg">
        ${grid}${sep}
        ${vols}
        ${candles}
        <path d="${ma20}" fill="none" stroke="var(--violet-soft)" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        <path d="${ma50}" fill="none" stroke="#7FB3D5" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        ${rsiRef}
        <path d="${rsiPath}" fill="none" stroke="var(--violet-2)" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        ${curMark}${overlay}${labels}${legend}${dates}
        <line id="cross-v" class="crossv" x1="0" y1="${priceTop}" x2="0" y2="${rsiBot}" style="display:none"/>
      </svg>`;
    return svg;
  }

  function updateOHLC(k) {
    const card = document.getElementById("chartcard"); if (!card || !chartGeo) return;
    const el = card.querySelector("#ohlc"); if (!el) return;
    const p = chartGeo.vis[k]; if (!p) return;
    const up = p.close >= p.open;
    const vol = p.volume ? (p.volume >= 1e6 ? (p.volume / 1e6).toFixed(1) + "M" : (p.volume / 1e3).toFixed(0) + "K") : "—";
    el.innerHTML = `<span class="oh">O <b>${p.open.toFixed(2)}</b></span><span class="oh">H <b>${p.high.toFixed(2)}</b></span><span class="oh">L <b>${p.low.toFixed(2)}</b></span><span class="oh">C <b class="${up ? "up" : "down"}">${p.close.toFixed(2)}</b></span><span class="oh">Vol <b>${vol}</b></span><span class="oh dt">${fmtD(p.date)}</span>`;
  }

  function wireChart() {
    const card = document.getElementById("chartcard"); if (!card || !chartGeo) return;
    const svg = card.querySelector("svg.chart-svg"); const v = card.querySelector("#cross-v"); if (!svg || !v) return;
    const g = chartGeo;
    function kFromX(clientX) { const rect = svg.getBoundingClientRect(); const sx = ((clientX - rect.left) / rect.width) * g.W; return Math.max(0, Math.min(g.N - 1, Math.floor((sx - g.padL) / g.slot))); }
    function show(k) { const x = g.padL + (k + 0.5) * g.slot; v.setAttribute("x1", x); v.setAttribute("x2", x); v.style.display = ""; updateOHLC(k); }
    function move(ev) { const cx = ev.touches ? ev.touches[0].clientX : ev.clientX; show(kFromX(cx)); if (ev.cancelable) ev.preventDefault(); }
    function leave() { v.style.display = "none"; updateOHLC(g.N - 1); }
    svg.addEventListener("mousemove", move); svg.addEventListener("mouseleave", leave);
    svg.addEventListener("touchstart", move, { passive: false }); svg.addEventListener("touchmove", move, { passive: false }); svg.addEventListener("touchend", leave);
    updateOHLC(g.N - 1);
  }

  function wireTF() {
    document.querySelectorAll("#chartcard .tf").forEach((b) => b.addEventListener("click", () => loadChart(chartSym, b.dataset.r)));
  }

  async function loadChart(sym, range) {
    chartSym = sym; chartRange = range;
    const card = document.getElementById("chartcard"); if (!card) return;
    card.innerHTML = chartShell(range, `<div class="chart-loading">loading chart…</div>`);
    wireTF();
    try {
      const r = await fetch(`/api/chart?symbol=${encodeURIComponent(sym)}&range=${range}`);
      const d = await r.json();
      if (!r.ok || !d.points || d.points.length < 2) {
        card.innerHTML = chartShell(range, `<div class="chart-empty">${esc((d && d.error) || "No price history for this ticker.")}</div>`);
        wireTF(); return;
      }
      card.innerHTML = chartShell(range, renderTerminal(d));
      wireTF(); wireChart();
      drawHeroSpark(d.points);
    } catch (e) {
      card.innerHTML = chartShell(range, `<div class="chart-empty">Couldn't load the chart.</div>`);
      wireTF();
    }
  }

  async function getChart(sym) {
    chartSym = sym; chartLogs = [];
    try {
      if (window.lidaAuth) {
        const { data, error } = await window.lidaAuth.client
          .from("research_log").select("*")
          .eq("symbol", String(sym).toUpperCase())
          .order("created_at", { ascending: false });
        if (!error && Array.isArray(data)) chartLogs = data;
      }
    } catch (e) { chartLogs = []; }
    loadChart(sym, chartRange);
  }

  async function getAnalysis(sym) {
    const box = document.createElement("div");
    box.className = "read thinking";
    box.textContent = "Thinking through the read\u2026 (a few seconds)";
    out.appendChild(box);
    try {
      const _s = window.lidaAuth ? await window.lidaAuth.getSession() : null;
      const res = await fetch("/api/analyze?symbol=" + encodeURIComponent(sym), { headers: { Authorization: "Bearer " + (_s ? _s.access_token : "") } });
      const d = await res.json();
      if (!res.ok) {
        box.className = "read";
        box.innerHTML = `<p class="error" style="margin:0">${esc(d.error || "Couldn't run the read.")}</p>`;
        return;
      }
      if (ctx) ctx.read = d.read;
      box.outerHTML = renderRead(d.read);
      out.insertAdjacentHTML("beforeend", renderEvidence(d));
      out.insertAdjacentHTML("beforeend", renderMove());
      wireMove();
    } catch (e) {
      box.className = "read";
      box.innerHTML = `<p class="error" style="margin:0">Couldn't reach the read service. Try again.</p>`;
    }
  }

  async function getRead() {
    const sym = input.value.trim().toUpperCase();
    if (!sym) { input.focus(); return; }
    btn.disabled = true; btn.textContent = "Reading\u2026"; out.innerHTML = ""; ctx = null;
    try {
      const res = await fetch("/api/market?symbol=" + encodeURIComponent(sym));
      const d = await res.json();
      if (!res.ok) { out.innerHTML = `<p class="error">${esc(d.error || "Something went wrong.")}</p>`; return; }
      ctx = { symbol: sym, price: d.price, read: null };
      out.innerHTML = priceCard(d);
      out.insertAdjacentHTML("beforeend", '<div class="chart-card show" id="chartcard"><div class="chart-loading">loading chart…</div></div>');
      getChart(sym);
      getAnalysis(sym);
    } catch (e) {
      out.innerHTML = `<p class="error">Couldn't reach the data server. Try again in a moment.</p>`;
    } finally {
      btn.disabled = false; btn.textContent = "Get read";
    }
  }

  btn.addEventListener("click", getRead);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") getRead(); });
  input.focus();

  // Auto-pull a read when a ticker is passed in the URL (e.g. tapped from the Watchlist).
  if (window.lidaAuth) {
    window.lidaAuth.getSession().then(function (sess) {
      if (!sess) return;
      var qp = new URLSearchParams(window.location.search).get("symbol");
      if (qp) { input.value = qp.toUpperCase(); getRead(); }
    });
  }
</script>
