<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Li-Da · Research desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:    #0F1117;
    --panel:  #181B24;
    --line:   #262A36;
    --paper:  #ECE7DE;
    --muted:  #868EA1;
    --amber:  #E0A341;
    --up:     #5BBF8A;
    --down:   #E0746A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink); color: var(--paper);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 7vh 20px 60px; -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 560px; }

  .eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--amber); margin-bottom: 14px; }
  h1 { font-family: "Fraunces", serif; font-weight: 400; font-size: clamp(30px, 7vw, 44px);
    line-height: 1.05; letter-spacing: -0.01em; margin-bottom: 10px; }
  .sub { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 32px; }

  .row { display: flex; gap: 10px; }
  input.symbol {
    flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 16px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 16px; outline: none;
    transition: border-color 0.15s;
  }
  input.symbol:focus { border-color: var(--amber); }
  input.symbol::placeholder { color: var(--muted); text-transform: none; letter-spacing: normal; }
  button.primary {
    background: var(--amber); color: var(--ink); border: none; border-radius: 10px;
    font-family: "Inter", sans-serif; font-weight: 600; font-size: 15px; padding: 0 22px;
    cursor: pointer; transition: opacity 0.15s;
  }
  button.primary:hover { opacity: 0.9; }
  button.primary:disabled { opacity: 0.5; cursor: default; }

  /* ---- shared card ---- */
  .card, .read, .evidence, .move { margin-top: 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 26px; }
  .card { margin-top: 26px; }
  .show { opacity: 0; transform: translateY(8px); animation: rise 0.35s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  /* ---- price card ---- */
  .card .name { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
  .card .ticker { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--amber); letter-spacing: 0.1em; }
  .price { font-family: "IBM Plex Mono", monospace; font-size: 42px; font-weight: 500; margin: 12px 0 6px; font-variant-numeric: tabular-nums; }
  .delta { font-family: "IBM Plex Mono", monospace; font-size: 15px; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); }
  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 24px; margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); }
  .stat { display: flex; justify-content: space-between; font-size: 14px; }
  .stat span:first-child { color: var(--muted); }
  .stat span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .asof { margin-top: 18px; font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }

  /* ---- the read ---- */
  .read.thinking { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 14px; }
  .read-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .read-eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-right: auto; }
  .lean { font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--amber); color: var(--amber); }
  .conf { font-family: "Inter", sans-serif; font-size: 12px; color: var(--muted); padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line); }
  .conf-reason { font-size: 13px; color: var(--muted); line-height: 1.4; margin-bottom: 18px; }
  .read-summary { font-family: "Fraunces", serif; font-size: 20px; line-height: 1.32; margin-bottom: 22px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 520px) { .cols { grid-template-columns: 1fr; } }
  .col h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .col.bull h4 { color: var(--up); } .col.bear h4 { color: var(--down); }
  .col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .col li { font-size: 14px; line-height: 1.45; color: var(--paper); padding-left: 16px; position: relative; }
  .col li::before { content: ""; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; }
  .col.bull li::before { background: var(--up); } .col.bear li::before { background: var(--down); }
  .block { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
  .lab { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .block p { font-size: 14px; line-height: 1.5; }
  .act ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .act li { font-size: 14px; line-height: 1.45; padding-left: 16px; position: relative; color: var(--paper); }
  .act li::before { content: "\203A"; position: absolute; left: 0; color: var(--amber); }
  .read-note { margin-top: 18px; font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }

  /* ---- evidence ---- */
  .evidence h3, .move h3 { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .figs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 24px; }
  @media (max-width: 420px) { .figs { grid-template-columns: 1fr; } }
  .fig { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px dotted var(--line); padding-bottom: 6px; }
  .fig span:first-child { color: var(--muted); }
  .fig span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .analyst { margin-top: 4px; font-size: 14px; line-height: 1.5; }
  .analyst .bar { display: flex; height: 8px; border-radius: 999px; overflow: hidden; margin-top: 10px; background: var(--line); }
  .analyst .bar i { display: block; height: 100%; }
  .analyst .bar .b { background: var(--up); } .analyst .bar .h { background: var(--muted); } .analyst .bar .s { background: var(--down); }
  .news { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
  .news a { color: var(--paper); text-decoration: none; font-size: 14px; line-height: 1.45; display: block; transition: color 0.15s; }
  .news a:hover { color: var(--amber); }
  .news .src { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px; }
  .empty { color: var(--muted); font-size: 14px; }

  /* ---- your move ---- */
  .movesub { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
  .seg { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .seg button { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 500; font-family: "Inter", sans-serif; cursor: pointer; transition: all 0.15s; }
  .seg button.active { background: rgba(224,163,65,0.12); border-color: var(--amber); color: var(--amber); }
  .fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  @media (max-width: 480px) { .fields { grid-template-columns: 1fr; } }
  .fields label { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .fields input { background: var(--ink); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 15px; padding: 10px 12px; outline: none; }
  .fields input:focus { border-color: var(--amber); }
  .rr { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
  .rr.good { color: var(--up); } .rr.bad { color: var(--down); }
  .reason { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .reason textarea { background: var(--ink); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "Inter", sans-serif; font-size: 14px; padding: 12px; outline: none; resize: vertical; line-height: 1.5; }
  .reason textarea:focus { border-color: var(--amber); }
  .logbtn { width: 100%; height: 46px; background: var(--amber); color: var(--ink); border: none; border-radius: 10px; font-family: "Inter", sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; transition: opacity 0.15s; }
  .logbtn:hover { opacity: 0.9; }
  .logbtn:disabled { opacity: 0.5; cursor: default; }
  .logmsg { margin-top: 14px; font-size: 14px; line-height: 1.5; }
  .logmsg.ok { color: var(--up); }
  .logmsg.err { color: var(--down); }

  .error { margin-top: 16px; color: var(--down); font-size: 15px; }
  .foot { margin-top: 40px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 18px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Li-Da · research desk</div>
    <h1>Pull a read.</h1>
    <p class="sub">A live quote, an honest read, the figures behind it — then you set your exits and log the call.</p>

    <div class="row">
      <input id="symbol" class="symbol" placeholder="Ticker, e.g. AAPL" autocomplete="off" spellcheck="false" />
      <button id="go" class="primary">Get read</button>
    </div>

    <div id="out"></div>

    <p class="foot">Data and reasoning, never a verdict. The call is always yours.</p>
  </div>

<script>
  const input = document.getElementById("symbol");
  const btn = document.getElementById("go");
  const out = document.getElementById("out");
  let ctx = null; // { symbol, price, read }

  function money(n) { return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function fmtCap(millions) {
    if (millions == null) return null;
    const v = millions * 1e6;
    if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
    if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
    return "$" + (v / 1e6).toFixed(0) + "M";
  }
  const num = (n, d = 2) => (n == null ? null : Number(n).toFixed(d));
  const pct = (n) => (n == null ? null : Number(n).toFixed(1) + "%");

  function priceCard(d) {
    const up = d.change >= 0;
    const arrow = up ? "\u25B2" : "\u25BC";
    const sign = up ? "+" : "";
    return `
      <div class="card show">
        <div class="name">${esc(d.name)}</div>
        <div class="ticker">${esc(d.symbol)}</div>
        <div class="price">${money(d.price)}</div>
        <div class="delta ${up ? "up" : "down"}">${arrow} ${sign}${money(d.change)}  (${sign}${d.percent.toFixed(2)}%)</div>
        <div class="stats">
          <div class="stat"><span>Open</span><span>${money(d.open)}</span></div>
          <div class="stat"><span>Prev close</span><span>${money(d.prevClose)}</span></div>
          <div class="stat"><span>Day high</span><span>${money(d.high)}</span></div>
          <div class="stat"><span>Day low</span><span>${money(d.low)}</span></div>
        </div>
        <div class="asof">as of ${new Date(d.asOf).toLocaleString()}</div>
      </div>`;
  }

  function renderRead(r) {
    const bull = (r.bull || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const bear = (r.bear || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const act = (r.before_you_act || []).map((p) => `<li>${esc(p)}</li>`).join("");
    return `
      <div class="read show">
        <div class="read-head">
          <span class="read-eyebrow">The read</span>
          <span class="lean">${esc(r.lean || "—")}</span>
          <span class="conf">${esc(r.confidence || "—")} confidence</span>
        </div>
        <div class="conf-reason">${esc(r.confidence_reason || "")}</div>
        <div class="read-summary">${esc(r.summary || "")}</div>
        <div class="cols">
          <div class="col bull"><h4>Bull case</h4><ul>${bull}</ul></div>
          <div class="col bear"><h4>Bear case</h4><ul>${bear}</ul></div>
        </div>
        <div class="block"><div class="lab">Levels to watch</div><p>${esc(r.levels || "—")}</p></div>
        <div class="block act"><div class="lab">Before you act</div><ul>${act}</ul></div>
        <div class="read-note">Reasoning, not advice. You decide.</div>
      </div>`;
  }

  function renderEvidence(d) {
    const f = d.figures || {};
    const rows = [];
    const cap = fmtCap(f.marketCap); if (cap) rows.push(["Market cap", cap]);
    if (num(f.pe) != null) rows.push(["P/E (TTM)", num(f.pe)]);
    if (f.low52 != null && f.high52 != null) rows.push(["52-week range", money(f.low52) + " – " + money(f.high52)]);
    if (pct(f.profitMargin) != null) rows.push(["Profit margin", pct(f.profitMargin)]);
    if (pct(f.revGrowth) != null) rows.push(["Revenue growth", pct(f.revGrowth)]);
    if (num(f.debtToEquity) != null) rows.push(["Debt / equity", num(f.debtToEquity)]);
    if (num(f.currentRatio) != null) rows.push(["Current ratio", num(f.currentRatio)]);
    if (num(f.eps) != null) rows.push(["EPS (TTM)", "$" + num(f.eps)]);

    const figsHtml = rows.length
      ? `<div class="figs">${rows.map((r) => `<div class="fig"><span>${esc(r[0])}</span><span>${esc(r[1])}</span></div>`).join("")}</div>`
      : `<p class="empty">No fundamentals available for this ticker.</p>`;

    let analystHtml = "";
    const a = d.analyst;
    if (a) {
      const buy = a.strongBuy + a.buy, hold = a.hold, sell = a.sell + a.strongSell;
      const total = buy + hold + sell || 1;
      const label = buy > sell ? "Buy-leaning" : sell > buy ? "Sell-leaning" : "Mixed";
      analystHtml = `
        <div class="block">
          <div class="lab">Analyst consensus${a.period ? " · " + esc(a.period) : ""}</div>
          <div class="analyst">${label} — ${buy} buy · ${hold} hold · ${sell} sell
            <div class="bar">
              <i class="b" style="width:${(buy / total) * 100}%"></i>
              <i class="h" style="width:${(hold / total) * 100}%"></i>
              <i class="s" style="width:${(sell / total) * 100}%"></i>
            </div>
          </div>
        </div>`;
    }

    const news = d.news || [];
    const newsHtml = news.length
      ? `<div class="news">${news.map((n) => {
            const date = n.datetime ? new Date(n.datetime * 1000).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
            const meta = [n.source, date].filter(Boolean).map(esc).join(" · ");
            const inner = `<span class="src">${meta}</span>${esc(n.headline)}`;
            return n.url ? `<a href="${esc(n.url)}" target="_blank" rel="noopener">${inner}</a>` : `<a>${inner}</a>`;
          }).join("")}</div>`
      : `<div class="news"><p class="empty">No recent news in the last 7 days.</p></div>`;

    return `<div class="evidence show"><h3>What it read</h3>${figsHtml}${analystHtml}${newsHtml}</div>`;
  }

  function renderMove() {
    return `
      <div class="move show">
        <h3>Your move</h3>
        <p class="movesub">Lock your exits before you're in the trade. The read is an input — this is your decision, on record.</p>
        <div class="seg" id="decision">
          <button data-v="buy" class="active">Buy</button>
          <button data-v="watch">Watch</button>
          <button data-v="sell">Sell</button>
          <button data-v="skip">Skip</button>
        </div>
        <div class="fields">
          <label>Entry <input id="f-entry" inputmode="decimal" /></label>
          <label>Stop-loss <input id="f-stop" inputmode="decimal" /></label>
          <label>Take-profit <input id="f-target" inputmode="decimal" /></label>
        </div>
        <div class="rr" id="rr"></div>
        <label class="reason">Why this, why now? What would make you wrong?
          <textarea id="f-reason" rows="3" placeholder="A sentence to your future self."></textarea>
        </label>
        <button id="logbtn" class="logbtn">Log to journal</button>
        <div id="logmsg" class="logmsg"></div>
      </div>`;
  }

  function updateRR() {
    const e = parseFloat(document.getElementById("f-entry").value);
    const s = parseFloat(document.getElementById("f-stop").value);
    const t = parseFloat(document.getElementById("f-target").value);
    const el = document.getElementById("rr");
    if (isNaN(e) || isNaN(s) || isNaN(t)) { el.textContent = ""; el.className = "rr"; return; }
    const risk = Math.abs(e - s), reward = Math.abs(t - e);
    if (risk === 0) { el.textContent = "Stop can't equal entry."; el.className = "rr bad"; return; }
    const rr = reward / risk;
    el.textContent = `Risk : Reward ≈ 1 : ${rr.toFixed(1)}`;
    el.className = "rr " + (rr >= 2 ? "good" : rr < 1 ? "bad" : "");
  }

  async function logDecision() {
    if (!ctx) return;
    const decision = (document.querySelector("#decision button.active") || {}).dataset
      ? document.querySelector("#decision button.active").dataset.v : null;
    const payload = {
      symbol: ctx.symbol,
      price: ctx.price,
      ai_lean: ctx.read && ctx.read.lean,
      ai_confidence: ctx.read && ctx.read.confidence,
      ai_summary: ctx.read && ctx.read.summary,
      decision,
      entry: document.getElementById("f-entry").value,
      stop_loss: document.getElementById("f-stop").value,
      take_profit: document.getElementById("f-target").value,
      reasoning: document.getElementById("f-reason").value,
    };
    const msg = document.getElementById("logmsg");
    const b = document.getElementById("logbtn");
    b.disabled = true; b.textContent = "Saving…"; msg.textContent = ""; msg.className = "logmsg";
    try {
      const r = await fetch("/api/log", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const d = await r.json();
      if (!r.ok) { msg.className = "logmsg err"; msg.textContent = d.error || "Couldn't save."; b.disabled = false; b.textContent = "Log to journal"; return; }
      const s = d.saved || {};
      const bits = [];
      if (s.stop_loss != null) bits.push("stop " + money(s.stop_loss));
      if (s.take_profit != null) bits.push("target " + money(s.take_profit));
      msg.className = "logmsg ok";
      msg.textContent = "Saved to your journal ✓  " + bits.join(" · ");
      b.textContent = "Logged ✓";
      setTimeout(() => { b.disabled = false; b.textContent = "Log again"; }, 1800);
    } catch (e) {
      msg.className = "logmsg err"; msg.textContent = "Couldn't reach the journal. Try again.";
      b.disabled = false; b.textContent = "Log to journal";
    }
  }

  function wireMove() {
    const seg = document.getElementById("decision");
    seg.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") {
        seg.querySelectorAll("button").forEach((x) => x.classList.remove("active"));
        e.target.classList.add("active");
      }
    });
    if (ctx && ctx.price != null) document.getElementById("f-entry").value = Number(ctx.price).toFixed(2);
    ["f-entry", "f-stop", "f-target"].forEach((id) => document.getElementById(id).addEventListener("input", updateRR));
    document.getElementById("logbtn").addEventListener("click", logDecision);
  }

  async function getAnalysis(sym) {
    const box = document.createElement("div");
    box.className = "read thinking";
    box.textContent = "Thinking through the read\u2026 (a few seconds)";
    out.appendChild(box);
    try {
      const res = await fetch("/api/analyze?symbol=" + encodeURIComponent(sym));
      const d = await res.json();
      if (!res.ok) {
        box.className = "read";
        box.innerHTML = `<p class="error" style="margin:0">${esc(d.error || "Couldn't run the read.")}</p>`;
        return;
      }
      if (ctx) ctx.read = d.read;
      box.outerHTML = renderRead(d.read);
      out.insertAdjacentHTML("beforeend", renderEvidence(d));
      out.insertAdjacentHTML("beforeend", renderMove());
      wireMove();
    } catch (e) {
      box.className = "read";
      box.innerHTML = `<p class="error" style="margin:0">Couldn't reach the read service. Try again.</p>`;
    }
  }

  async function getRead() {
    const sym = input.value.trim().toUpperCase();
    if (!sym) { input.focus(); return; }
    btn.disabled = true; btn.textContent = "Reading\u2026"; out.innerHTML = ""; ctx = null;
    try {
      const res = await fetch("/api/market?symbol=" + encodeURIComponent(sym));
      const d = await res.json();
      if (!res.ok) { out.innerHTML = `<p class="error">${esc(d.error || "Something went wrong.")}</p>`; return; }
      ctx = { symbol: sym, price: d.price, read: null };
      out.innerHTML = priceCard(d);
      getAnalysis(sym);
    } catch (e) {
      out.innerHTML = `<p class="error">Couldn't reach the data server. Try again in a moment.</p>`;
    } finally {
      btn.disabled = false; btn.textContent = "Get read";
    }
  }

  btn.addEventListener("click", getRead);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") getRead(); });
  input.focus();
</script>
</body>
</html>
