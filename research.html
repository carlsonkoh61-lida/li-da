<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Li-Da · Research desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:         #0B0D14;
    --panel:      rgba(20, 24, 38, 0.66);
    --line:       rgba(255, 255, 255, 0.08);
    --paper:      #EDEFF7;
    --muted:      #8A92A8;
    --violet:     #8576FF;
    --violet-2:   #B39DFF;
    --violet-soft:#C9BEFF;
    --up:         #4ADE9A;
    --down:       #FF6B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(900px 620px at 78% -12%, rgba(133,118,255,0.12), transparent 60%),
      radial-gradient(820px 720px at 16% 112%, rgba(133,118,255,0.10), transparent 60%);
    background-attachment: fixed;
    color: var(--paper);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 8vh 20px 70px; -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 560px; }

  .eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--violet-soft); margin-bottom: 16px; }
  h1 {
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: clamp(32px, 7vw, 46px);
    line-height: 1.04; letter-spacing: -0.02em; margin-bottom: 12px;
    background: linear-gradient(118deg, var(--paper) 38%, var(--violet-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 15px; line-height: 1.55; margin-bottom: 34px; }

  .row { display: flex; gap: 10px; }
  input.symbol {
    flex: 1; background: rgba(20,24,38,0.6); border: 1px solid var(--line); border-radius: 12px;
    color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 16px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 15px 16px; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input.symbol:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(133,118,255,0.16); }
  input.symbol::placeholder { color: var(--muted); text-transform: none; letter-spacing: normal; }

  button.primary, .logbtn {
    background: linear-gradient(135deg, var(--violet), var(--violet-2));
    color: #0B0D14; border: none; border-radius: 12px;
    font-family: "Inter", sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
    box-shadow: 0 6px 24px -6px rgba(133,118,255,0.55);
  }
  button.primary { padding: 0 24px; }
  button.primary:hover, .logbtn:hover { filter: brightness(1.06); box-shadow: 0 8px 30px -6px rgba(133,118,255,0.7); }
  button.primary:disabled, .logbtn:disabled { opacity: 0.5; cursor: default; filter: none; box-shadow: none; }

  /* ---- glass cards ---- */
  .card, .read, .evidence, .move {
    margin-top: 16px; background: var(--panel);
    backdrop-filter: blur(16px) saturate(125%); -webkit-backdrop-filter: blur(16px) saturate(125%);
    border: 1px solid var(--line); border-radius: 18px; padding: 26px;
    box-shadow: 0 12px 44px -14px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .card { margin-top: 28px; }
  .card:hover, .read:hover, .evidence:hover, .move:hover {
    transform: translateY(-2px); border-color: rgba(133,118,255,0.22);
    box-shadow: 0 18px 54px -16px rgba(0,0,0,0.62), 0 0 0 1px rgba(133,118,255,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .show { opacity: 0; transform: translateY(10px); animation: rise 0.4s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  .card-eyebrow, .evidence h3, .move h3 { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .card-eyebrow { margin-bottom: 14px; }
  .evidence h3, .move h3 { margin-bottom: 18px; }

  /* ---- price card ---- */
  .card .name { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
  .card .ticker { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--violet-soft); letter-spacing: 0.1em; }
  .price { font-family: "IBM Plex Mono", monospace; font-size: 44px; font-weight: 500; margin: 12px 0 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .delta { font-family: "IBM Plex Mono", monospace; font-size: 15px; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); }
  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 24px; margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); }
  .stat { display: flex; justify-content: space-between; font-size: 14px; }
  .stat span:first-child { color: var(--muted); }
  .stat span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .asof { margin-top: 18px; font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }

  /* ---- the read ---- */
  .read.thinking { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 14px; }
  /* signature: the signal module */
  .signal-module {
    display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(133,118,255,0.16), rgba(133,118,255,0.03));
    border: 1px solid rgba(133,118,255,0.35); margin-bottom: 18px;
  }
  .signal-module .sm-label { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .signal-module .sm-lean { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 23px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--violet-soft); margin-right: auto; }
  .signal-module .sm-conf { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px; }
  .signal-module.conf-low { box-shadow: 0 0 12px -4px rgba(133,118,255,0.2); }
  .signal-module.conf-medium { box-shadow: 0 0 20px -4px rgba(133,118,255,0.34); border-color: rgba(133,118,255,0.45); }
  .signal-module.conf-high { border-color: rgba(133,118,255,0.6); animation: pulse 3.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 22px -4px rgba(133,118,255,0.42); } 50% { box-shadow: 0 0 38px 0 rgba(133,118,255,0.62); } }

  .conf-reason { font-size: 13px; color: var(--muted); line-height: 1.45; margin-bottom: 18px; }
  .read-summary { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 20px; line-height: 1.36; margin-bottom: 22px; letter-spacing: -0.01em; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 520px) { .cols { grid-template-columns: 1fr; } }
  .col h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .col.bull h4 { color: var(--up); } .col.bear h4 { color: var(--down); }
  .col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .col li { font-size: 14px; line-height: 1.45; color: var(--paper); padding-left: 16px; position: relative; }
  .col li::before { content: ""; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; }
  .col.bull li::before { background: var(--up); } .col.bear li::before { background: var(--down); }
  .block { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
  .lab { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .block p { font-size: 14px; line-height: 1.5; }
  .act ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .act li { font-size: 14px; line-height: 1.45; padding-left: 16px; position: relative; color: var(--paper); }
  .act li::before { content: "\203A"; position: absolute; left: 0; color: var(--violet-soft); }
  .read-note { margin-top: 18px; font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }
  /* ---- stress test ---- */
  .stress .st-row { margin-bottom: 12px; }
  .stress .st-key { font-family: "IBM Plex Mono", monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--violet-soft); margin-bottom: 3px; }
  .stress .st-row p { font-size: 14px; line-height: 1.5; color: var(--paper); }
  .st-frag { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
  .frag-pill { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .frag-pill.low { color: var(--up); border-color: rgba(74,222,154,0.5); }
  .frag-pill.medium { color: var(--violet-soft); border-color: rgba(133,118,255,0.5); }
  .frag-pill.high { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .frag-reason { font-size: 13px; color: var(--muted); line-height: 1.4; }

  /* ---- evidence ---- */
  .figs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 24px; }
  @media (max-width: 420px) { .figs { grid-template-columns: 1fr; } }
  .fig { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px dotted var(--line); padding-bottom: 6px; }
  .fig span:first-child { color: var(--muted); }
  .fig span:last-child { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .analyst { margin-top: 4px; font-size: 14px; line-height: 1.5; }
  .analyst .bar { display: flex; height: 8px; border-radius: 999px; overflow: hidden; margin-top: 10px; background: rgba(255,255,255,0.06); }
  .analyst .bar i { display: block; height: 100%; }
  .analyst .bar .b { background: var(--up); } .analyst .bar .h { background: var(--muted); } .analyst .bar .s { background: var(--down); }
  /* ---- versus peers ---- */
  .peer-take { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .ptag { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(133,118,255,0.5); color: var(--violet-soft); white-space: nowrap; }
  .peer-take p { font-size: 14px; line-height: 1.5; color: var(--paper); flex: 1; min-width: 200px; }
  table.peers { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.peers th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 500; padding: 6px 0; border-bottom: 1px solid var(--line); }
  table.peers th:not(:first-child), table.peers td:not(:first-child) { text-align: right; }
  table.peers td { padding: 9px 0; border-bottom: 1px dotted var(--line); font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; color: var(--paper); }
  table.peers tr.target td { color: var(--violet-soft); }
  table.peers tr.target td:first-child { font-weight: 600; }

  /* ---- news take ---- */
  .nt-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .signal { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .signal.positive { color: var(--up); border-color: rgba(74,222,154,0.5); }
  .signal.negative { color: var(--down); border-color: rgba(255,107,107,0.5); }
  .signal.mixed { color: var(--violet-soft); border-color: rgba(133,118,255,0.5); }
  .signal.quiet { color: var(--muted); border-color: var(--line); }
  .nt-headline { font-size: 15px; font-weight: 500; line-height: 1.4; }
  .nt-detail { font-size: 14px; line-height: 1.5; color: var(--paper); }
  .nt-matters { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .nt-matters li { font-size: 13px; line-height: 1.45; color: var(--muted); padding-left: 14px; position: relative; }
  .nt-matters li::before { content: "\00B7"; position: absolute; left: 2px; color: var(--violet-soft); font-weight: 700; }
  .sources { margin-top: 14px; }
  .sources summary { cursor: pointer; font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); list-style: none; padding: 6px 0; transition: color 0.15s; }
  .sources summary::-webkit-details-marker { display: none; }
  .sources summary:hover { color: var(--violet-soft); }
  .sources summary::before { content: "\25B8  "; }
  .sources[open] summary::before { content: "\25BE  "; }
  .news { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--line); }
  .news a { color: var(--paper); text-decoration: none; font-size: 14px; line-height: 1.45; display: block; transition: color 0.15s; }
  .news a:hover { color: var(--violet-soft); }
  .news .src { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px; }
  .empty { color: var(--muted); font-size: 14px; }

  /* ---- terminal chart ---- */
  .chart-card { margin-top: 16px; background: var(--panel); backdrop-filter: blur(16px) saturate(125%); -webkit-backdrop-filter: blur(16px) saturate(125%); border: 1px solid var(--line); border-radius: 18px; padding: 24px; position: relative; box-shadow: 0 12px 44px -14px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05); transition: transform 0.25s ease, border-color 0.25s ease; }
  .chart-card:hover { transform: translateY(-2px); border-color: rgba(133,118,255,0.22); }
  .chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
  .tfbar { display: flex; gap: 6px; }
  .tf { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; font-family: "IBM Plex Mono", monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .tf:hover { color: var(--paper); border-color: rgba(133,118,255,0.4); }
  .tf.active { background: rgba(133,118,255,0.15); border-color: var(--violet); color: var(--violet-soft); }
  .ohlc { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted); margin-bottom: 8px; min-height: 16px; display: flex; gap: 13px; flex-wrap: wrap; }
  .ohlc .oh b { color: var(--paper); font-weight: 500; }
  .ohlc .oh b.up { color: var(--up); } .ohlc .oh b.down { color: var(--down); }
  .ohlc .dt { margin-left: auto; }
  .chart-svg { width: 100%; height: auto; display: block; overflow: visible; cursor: crosshair; touch-action: none; }
  .gridline { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
  .sep { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .refline { stroke: rgba(255,255,255,0.12); stroke-width: 1; stroke-dasharray: 3 3; }
  .curline { stroke: var(--violet); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.7; }
  .crossv { stroke: rgba(255,255,255,0.28); stroke-width: 1; }
  .axlbl { fill: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 10px; }
  .curlbl { fill: var(--violet-soft); font-family: "IBM Plex Mono", monospace; font-size: 10px; font-weight: 600; }
  .panlbl { fill: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .ma20 { fill: var(--violet-soft); } .ma50 { fill: #7FB3D5; }
  .chart-loading { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 14px; padding: 40px 0; text-align: center; }
  .chart-empty { color: var(--muted); font-size: 14px; padding: 30px 0; text-align: center; }

  /* ---- your move ---- */
  .movesub { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
  .seg { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .seg button { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 500; font-family: "Inter", sans-serif; cursor: pointer; transition: all 0.15s; }
  .seg button:hover { border-color: rgba(133,118,255,0.4); color: var(--paper); }
  .seg button.active { background: rgba(133,118,255,0.15); border-color: var(--violet); color: var(--violet-soft); }
  .fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  @media (max-width: 480px) { .fields { grid-template-columns: 1fr; } }
  .fields label { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .fields input { background: rgba(11,13,20,0.6); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "IBM Plex Mono", monospace; font-size: 15px; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  .fields input:focus { border-color: var(--violet); }
  .rr { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
  .rr.good { color: var(--up); } .rr.bad { color: var(--down); }
  .reason { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .reason textarea { background: rgba(11,13,20,0.6); border: 1px solid var(--line); border-radius: 8px; color: var(--paper); font-family: "Inter", sans-serif; font-size: 14px; padding: 12px; outline: none; resize: vertical; line-height: 1.5; transition: border-color 0.15s; }
  .reason textarea:focus { border-color: var(--violet); }
  .logbtn { width: 100%; height: 48px; }
  .logmsg { margin-top: 14px; font-size: 14px; line-height: 1.5; }
  .logmsg.ok { color: var(--up); }
  .logmsg.err { color: var(--down); }

  .error { margin-top: 16px; color: var(--down); font-size: 15px; }
  .foot { margin-top: 44px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 20px; line-height: 1.5; }

  @media (prefers-reduced-motion: reduce) {
    .show { animation: none; opacity: 1; transform: none; }
    .signal-module.conf-high { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Li-Da · research desk</div>
    <h1>Pull a read.</h1>
    <p class="sub">A live quote, an honest read, the news distilled — then you set your exits and log the call.</p>

    <div class="row">
      <input id="symbol" class="symbol" placeholder="Ticker, e.g. AAPL" autocomplete="off" spellcheck="false" />
      <button id="go" class="primary">Get read</button>
    </div>

    <div id="out"></div>

    <p class="foot">Data and reasoning, never a verdict. The call is always yours.</p>
  </div>

<script>
  const input = document.getElementById("symbol");
  const btn = document.getElementById("go");
  const out = document.getElementById("out");
  let ctx = null;
  let chartSym = null;
  let chartRange = "3m";
  let chartGeo = null;

  function money(n) { return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function fmtCap(millions) {
    if (millions == null) return null;
    const v = millions * 1e6;
    if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
    if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
    return "$" + (v / 1e6).toFixed(0) + "M";
  }
  const num = (n, d = 2) => (n == null ? null : Number(n).toFixed(d));
  const pct = (n) => (n == null ? null : Number(n).toFixed(1) + "%");

  function priceCard(d) {
    const up = d.change >= 0;
    const arrow = up ? "\u25B2" : "\u25BC";
    const sign = up ? "+" : "";
    return `
      <div class="card show">
        <div class="name">${esc(d.name)}</div>
        <div class="ticker">${esc(d.symbol)}</div>
        <div class="price">${money(d.price)}</div>
        <div class="delta ${up ? "up" : "down"}">${arrow} ${sign}${money(d.change)}  (${sign}${d.percent.toFixed(2)}%)</div>
        <div class="stats">
          <div class="stat"><span>Open</span><span>${money(d.open)}</span></div>
          <div class="stat"><span>Prev close</span><span>${money(d.prevClose)}</span></div>
          <div class="stat"><span>Day high</span><span>${money(d.high)}</span></div>
          <div class="stat"><span>Day low</span><span>${money(d.low)}</span></div>
        </div>
        <div class="asof">as of ${new Date(d.asOf).toLocaleString()}</div>
      </div>`;
  }

  function renderRead(r) {
    const bull = (r.bull || []).map((p) => `<li>${esc(p)}</li>`).join("");
    const bear = (r.bear || []).map((p) => `<li>${esc(p)}</li>`).join("");

    const sourceItems = news.length
      ? news.map((n) => {
          const date = n.datetime ? new Date(n.datetime * 1000).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
          const meta = [n.source, date].filter(Boolean).map(esc).join(" · ");

        }).join("")
      : `<p class="empty">No recent news in the last 7 days.</p>`;

    const newsHtml = `

  function renderMove() {

  function updateRR() {
    const e = parseFloat(document.getElementById("f-entry").value);
    const s = parseFloat(document.getElementById("f-stop").value);
    const t = parseFloat(document.getElementById("f-target").value);
    const el = document.getElementById("rr");
    if (isNaN(e) || isNaN(s) || isNaN(t)) { el.textContent = ""; el.className = "rr"; return; }
    const risk = Math.abs(e - s), reward = Math.abs(t - e);
    if (risk === 0) { el.textContent = "Stop can't equal entry."; el.className = "rr bad"; return; }
    const rr = reward / risk;
    el.textContent = `Risk : Reward ≈ 1 : ${rr.toFixed(1)}`;
    el.className = "rr " + (rr >= 2 ? "good" : rr < 1 ? "bad" : "");
  }

  async function logDecision() {
    if (!ctx) return;
    const activeBtn = document.querySelector("#decision button.active");
    const decision = activeBtn ? activeBtn.dataset.v : null;
    const payload = {
      symbol: ctx.symbol, price: ctx.price,
      ai_lean: ctx.read && ctx.read.lean,
      ai_confidence: ctx.read && ctx.read.confidence,
      ai_summary: ctx.read && ctx.read.summary,
      decision,
      entry: document.getElementById("f-entry").value,
      stop_loss: document.getElementById("f-stop").value,
      take_profit: document.getElementById("f-target").value,
      reasoning: document.getElementById("f-reason").value,
    };
    const msg = document.getElementById("logmsg");
    const b = document.getElementById("logbtn");
    b.disabled = true; b.textContent = "Saving…"; msg.textContent = ""; msg.className = "logmsg";
    try {
      const r = await fetch("/api/log", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const d = await r.json();
      if (!r.ok) { msg.className = "logmsg err"; msg.textContent = d.error || "Couldn't save."; b.disabled = false; b.textContent = "Log to journal"; return; }
      const s = d.saved || {};
      const bits = [];
      if (s.stop_loss != null) bits.push("stop " + money(s.stop_loss));
      if (s.take_profit != null) bits.push("target " + money(s.take_profit));
      msg.className = "logmsg ok";
      msg.textContent = "Saved to your journal ✓  " + bits.join(" · ");
      b.textContent = "Logged ✓";
      setTimeout(() => { b.disabled = false; b.textContent = "Log again"; }, 1800);
    } catch (e) {
      msg.className = "logmsg err"; msg.textContent = "Couldn't reach the journal. Try again.";
      b.disabled = false; b.textContent = "Log to journal";
    }
  }

  function wireMove() {
    const seg = document.getElementById("decision");
    seg.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") {
        seg.querySelectorAll("button").forEach((x) => x.classList.remove("active"));
        e.target.classList.add("active");
      }
    });
    if (ctx && ctx.price != null) document.getElementById("f-entry").value = Number(ctx.price).toFixed(2);
    ["f-entry", "f-stop", "f-target"].forEach((id) => document.getElementById(id).addEventListener("input", updateRR));
    document.getElementById("logbtn").addEventListener("click", logDecision);
  }

  function fmtD(d) {
    try { return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
    catch (e) { return d; }
  }
  function sma(a, p) {
    const out = new Array(a.length).fill(null);
    let sum = 0;
    for (let i = 0; i < a.length; i++) { sum += a[i]; if (i >= p) sum -= a[i - p]; if (i >= p - 1) out[i] = sum / p; }
    return out;
  }
  function rsi14(a) {
    const p = 14, out = new Array(a.length).fill(null);
    if (a.length <= p) return out;
    let g = 0, l = 0;
    for (let i = 1; i <= p; i++) { const d = a[i] - a[i - 1]; if (d >= 0) g += d; else l -= d; }
    let ag = g / p, al = l / p;
    out[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    for (let i = p + 1; i < a.length; i++) {
      const d = a[i] - a[i - 1], gg = d > 0 ? d : 0, ll = d < 0 ? -d : 0;
      ag = (ag * (p - 1) + gg) / p; al = (al * (p - 1) + ll) / p;
      out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }
    return out;
  }

  function chartShell(range, inner) {
    const tfs = [["1m", "1M"], ["3m", "3M"], ["6m", "6M"], ["1y", "1Y"]];
    const btns = tfs.map(([v, l]) => `<button class="tf ${v === range ? "active" : ""}" data-r="${v}">${l}</button>`).join("");
    return `
      <div class="chart-top">
        <span class="card-eyebrow" style="margin:0">Price</span>
        <div class="tfbar">${btns}</div>
      </div>
      <div class="ohlc" id="ohlc"></div>
      <div class="chart-plot">${inner}</div>`;
  }

  function renderTerminal(d) {
    const points = d.points, display = d.display, L = points.length;
    const start = Math.max(0, L - display);
    const vis = points.slice(start);
    const N = vis.length;
    const closes = points.map((p) => p.close);
    const s20 = sma(closes, 20), s50 = sma(closes, 50), rsi = rsi14(closes);
    const current = ctx && ctx.price != null ? ctx.price : closes[L - 1];

    const W = 700, H = 380, padL = 6, padR = 52;
    const priceTop = 24, priceH = 176, priceBot = priceTop + priceH;
    const volTop = 214, volH = 44, volBot = volTop + volH;
    const rsiTop = 282, rsiH = 64, rsiBot = rsiTop + rsiH;
    const plotW = W - padL - padR, slot = plotW / N, bodyW = Math.max(1, slot * 0.66);
    const xC = (k) => padL + (k + 0.5) * slot;

    let pMin = Infinity, pMax = -Infinity;
    vis.forEach((p) => { pMin = Math.min(pMin, p.low); pMax = Math.max(pMax, p.high); });
    for (let k = 0; k < N; k++) { const fi = start + k;[s20[fi], s50[fi]].forEach((v) => { if (v != null) { pMin = Math.min(pMin, v); pMax = Math.max(pMax, v); } }); }
    if (current != null) { pMin = Math.min(pMin, current); pMax = Math.max(pMax, current); }
    const pPad = ((pMax - pMin) || 1) * 0.06; pMin -= pPad; pMax += pPad;
    const pY = (v) => priceTop + (1 - (v - pMin) / (pMax - pMin)) * priceH;

    let vMax = 0; vis.forEach((p) => { vMax = Math.max(vMax, p.volume); });
    const vY = (v) => volBot - (vMax ? v / vMax : 0) * volH;
    const rY = (v) => rsiTop + (1 - v / 100) * rsiH;

    let candles = "", vols = "";
    for (let k = 0; k < N; k++) {
      const p = vis[k], x = xC(k), up = p.close >= p.open, col = up ? "var(--up)" : "var(--down)";
      const yo = pY(p.open), yc = pY(p.close), top = Math.min(yo, yc), bh = Math.max(1, Math.abs(yo - yc));
      candles += `<line x1="${x.toFixed(1)}" y1="${pY(p.high).toFixed(1)}" x2="${x.toFixed(1)}" y2="${pY(p.low).toFixed(1)}" stroke="${col}" stroke-width="1"/>`;
      candles += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${top.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`;
      const vy = vY(p.volume);
      vols += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${vy.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${(volBot - vy).toFixed(1)}" fill="${col}" opacity="0.3"/>`;
    }

    function maPath(arr) {
      let dstr = "", started = false;
      for (let k = 0; k < N; k++) { const v = arr[start + k]; if (v == null) continue; const x = xC(k), y = pY(v); dstr += (started ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; started = true; }
      return dstr;
    }
    const ma20 = maPath(s20), ma50 = maPath(s50);

    let rsiPath = "", st = false;
    for (let k = 0; k < N; k++) { const v = rsi[start + k]; if (v == null) continue; const x = xC(k), y = rY(v); rsiPath += (st ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; st = true; }

    // price gridlines + labels
    let grid = "";
    for (let i = 0; i <= 3; i++) {
      const val = pMin + (i / 3) * (pMax - pMin), y = pY(val);
      grid += `<line class="gridline" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/>`;
      grid += `<text class="axlbl" x="${W - padR + 4}" y="${(y + 3).toFixed(1)}">${val.toFixed(2)}</text>`;
    }
    // current price line + label
    const cy = pY(current);
    const curMark = `<line class="curline" x1="${padL}" y1="${cy.toFixed(1)}" x2="${W - padR}" y2="${cy.toFixed(1)}"/>
      <text class="curlbl" x="${W - padR + 4}" y="${(cy + 3).toFixed(1)}">${current.toFixed(2)}</text>
      <circle cx="${xC(N - 1).toFixed(1)}" cy="${cy.toFixed(1)}" r="3" fill="var(--violet-2)"/>`;

    // rsi reference lines
    const rsiRef = [30, 70].map((lv) => `<line class="refline" x1="${padL}" y1="${rY(lv).toFixed(1)}" x2="${W - padR}" y2="${rY(lv).toFixed(1)}"/><text class="axlbl" x="${W - padR + 4}" y="${(rY(lv) + 3).toFixed(1)}">${lv}</text>`).join("");

    // x date labels
    let dates = "";
    [0, Math.floor((N - 1) / 2), N - 1].forEach((k) => {
      const x = Math.min(W - padR - 20, Math.max(padL, xC(k)));
      dates += `<text class="axlbl" x="${x.toFixed(1)}" y="372" text-anchor="middle">${fmtD(vis[k].date)}</text>`;
    });

    // separators + panel labels + legend
    const sep = `<line class="sep" x1="${padL}" y1="${volTop - 6}" x2="${W - padR}" y2="${volTop - 6}"/><line class="sep" x1="${padL}" y1="${rsiTop - 6}" x2="${W - padR}" y2="${rsiTop - 6}"/>`;
    const labels = `<text class="panlbl" x="${padL}" y="${volTop + 8}">Volume</text><text class="panlbl" x="${padL}" y="${rsiTop + 8}">RSI 14</text>`;
    const legend = `<text class="panlbl ma20" x="${padL}" y="${priceTop - 8}">— MA20</text><text class="panlbl ma50" x="${padL + 54}" y="${priceTop - 8}">— MA50</text>`;

    chartGeo = { vis, N, start, padL, slot, W };

    const svg = `
      <svg viewBox="0 0 ${W} ${H}" class="chart-svg">
        ${grid}${sep}
        ${vols}
        ${candles}
        <path d="${ma20}" fill="none" stroke="var(--violet-soft)" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        <path d="${ma50}" fill="none" stroke="#7FB3D5" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        ${rsiRef}
        <path d="${rsiPath}" fill="none" stroke="var(--violet-2)" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        ${curMark}${labels}${legend}${dates}
        <line id="cross-v" class="crossv" x1="0" y1="${priceTop}" x2="0" y2="${rsiBot}" style="display:none"/>
      </svg>`;
    return svg;
  }

  function updateOHLC(k) {
    const card = document.getElementById("chartcard"); if (!card || !chartGeo) return;
    const el = card.querySelector("#ohlc"); if (!el) return;
    const p = chartGeo.vis[k]; if (!p) return;
    const up = p.close >= p.open;
    const vol = p.volume ? (p.volume >= 1e6 ? (p.volume / 1e6).toFixed(1) + "M" : (p.volume / 1e3).toFixed(0) + "K") : "—";
    el.innerHTML = `<span class="oh">O <b>${p.open.toFixed(2)}</b></span><span class="oh">H <b>${p.high.toFixed(2)}</b></span><span class="oh">L <b>${p.low.toFixed(2)}</b></span><span class="oh">C <b class="${up ? "up" : "down"}">${p.close.toFixed(2)}</b></span><span class="oh">Vol <b>${vol}</b></span><span class="oh dt">${fmtD(p.date)}</span>`;
  }

  function wireChart() {
    const card = document.getElementById("chartcard"); if (!card || !chartGeo) return;
    const svg = card.querySelector("svg.chart-svg"); const v = card.querySelector("#cross-v"); if (!svg || !v) return;
    const g = chartGeo;
    function kFromX(clientX) { const rect = svg.getBoundingClientRect(); const sx = ((clientX - rect.left) / rect.width) * g.W; return Math.max(0, Math.min(g.N - 1, Math.floor((sx - g.padL) / g.slot))); }
    function show(k) { const x = g.padL + (k + 0.5) * g.slot; v.setAttribute("x1", x); v.setAttribute("x2", x); v.style.display = ""; updateOHLC(k); }
    function move(ev) { const cx = ev.touches ? ev.touches[0].clientX : ev.clientX; show(kFromX(cx)); if (ev.cancelable) ev.preventDefault(); }
    function leave() { v.style.display = "none"; updateOHLC(g.N - 1); }
    svg.addEventListener("mousemove", move); svg.addEventListener("mouseleave", leave);
    svg.addEventListener("touchstart", move, { passive: false }); svg.addEventListener("touchmove", move, { passive: false }); svg.addEventListener("touchend", leave);
    updateOHLC(g.N - 1);
  }

  function wireTF() {
    document.querySelectorAll("#chartcard .tf").forEach((b) => b.addEventListener("click", () => loadChart(chartSym, b.dataset.r)));
  }

  async function loadChart(sym, range) {
    chartSym = sym; chartRange = range;
    const card = document.getElementById("chartcard"); if (!card) return;
    card.innerHTML = chartShell(range, `<div class="chart-loading">loading chart…</div>`);
    wireTF();
    try {
      const r = await fetch(`/api/chart?symbol=${encodeURIComponent(sym)}&range=${range}`);
      const d = await r.json();
      if (!r.ok || !d.points || d.points.length < 2) {
        card.innerHTML = chartShell(range, `<div class="chart-empty">${esc((d && d.error) || "No price history for this ticker.")}</div>`);
        wireTF(); return;
      }
      card.innerHTML = chartShell(range, renderTerminal(d));
      wireTF(); wireChart();
    } catch (e) {
      card.innerHTML = chartShell(range, `<div class="chart-empty">Couldn't load the chart.</div>`);
      wireTF();
    }
  }

  function getChart(sym) { chartSym = sym; loadChart(sym, chartRange); }

  async function getAnalysis(sym) {
    const box = document.createElement("div");
    box.className = "read thinking";
    box.textContent = "Thinking through the read\u2026 (a few seconds)";
    out.appendChild(box);
    try {
      const res = await fetch("/api/analyze?symbol=" + encodeURIComponent(sym));
      const d = await res.json();
      if (!res.ok) {
        box.className = "read";
        box.innerHTML = `<p class="error" style="margin:0">${esc(d.error || "Couldn't run the read.")}</p>`;
        return;
      }
      if (ctx) ctx.read = d.read;
      box.outerHTML = renderRead(d.read);
      out.insertAdjacentHTML("beforeend", renderEvidence(d));
      out.insertAdjacentHTML("beforeend", renderMove());
      wireMove();
    } catch (e) {
      box.className = "read";
      box.innerHTML = `<p class="error" style="margin:0">Couldn't reach the read service. Try again.</p>`;
    }
  }

  async function getRead() {
    const sym = input.value.trim().toUpperCase();
    if (!sym) { input.focus(); return; }
    btn.disabled = true; btn.textContent = "Reading\u2026"; out.innerHTML = ""; ctx = null;
    try {
      const res = await fetch("/api/market?symbol=" + encodeURIComponent(sym));
      const d = await res.json();
      if (!res.ok) { out.innerHTML = `<p class="error">${esc(d.error || "Something went wrong.")}</p>`; return; }
      ctx = { symbol: sym, price: d.price, read: null };
      out.innerHTML = priceCard(d);
      out.insertAdjacentHTML("beforeend", '<div class="chart-card show" id="chartcard"><div class="chart-loading">loading chart…</div></div>');
      getChart(sym);
      getAnalysis(sym);
    } catch (e) {
      out.innerHTML = `<p class="error">Couldn't reach the data server. Try again in a moment.</p>`;
    } finally {
      btn.disabled = false; btn.textContent = "Get read";
    }
  }

  btn.addEventListener("click", getRead);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") getRead(); });
  input.focus();
</script>
</body>
</html>
